version: 2

sources:
  - name: mysql
    description: >
      ustrading System Event Log — a MySQL table of system/event logs written
      by all company apps (PDA, CatalogFS, CatalogFC, Vegas, CatalogSE, Web)
      via a unified API. ~600k events/month. MySQL is strictly READ-ONLY for
      dbt — never write back. Local dev reads data/system_events.parquet,
      produced from raw API JSON by scripts/flatten_api_json.sql; production
      connection method depends on the engine decision (followup.md).
    tags: ["raw", "mysql"]
    # TEMP: on Databricks the source is a sample upload (scripts/
    # upload_sample_to_databricks.py) into temp_-prefixed schema/table —
    # replace with the real MySQL ingestion target and drop temp_mysql
    # once that lands (followup.md). Ignored on DuckDB (external_location
    # wins there).
    schema: temp_mysql
    config:
      meta:
        access: read_only
        source_system: mysql
      # dbt-duckdb: resolve the source table to the flattened local sample.
      # Engine-specific by design; the production source overrides this.
      external_location: "data/system_events.parquet"

    tables:
      # TODO: confirm the real MySQL table name (doc is silent); local file
      # name stays system_events.parquet either way.
      - name: system_events
        identifier: temp_system_events
        description: One row per event from any app, written via the unified logging API
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 72, period: hour}
        columns:
          - name: entity_id
            description: Auto-increment PK — basis for dedup and incremental processing
          - name: sales_code
            description: Sales team / territory code
          - name: username
            description: >
              Salesperson login on sales apps (PDA-A, CatalogFS-*);
              customer account no. on customer apps (Vegas-*, CatalogFC-*,
              CatalogSE, Web)
          - name: ust_customer_no
            description: Customer the salesperson is acting for; empty if none / customer app
          - name: location
            description: '"lat,lon" decimal degrees, or empty; populated only when the event captures Geo'
          - name: timezone
            description: Device UTC offset, e.g. GMT+8
          - name: event_time
            description: Device LOCAL time — convert to UTC by subtracting the timezone offset
          - name: source
            description: "App source code: PDA-A, CatalogFC-A/I, CatalogFS-I/A, Vegas-I/A, CatalogSE, Web"
          - name: version
            description: App version major.minor.build
          - name: description_code
            description: >
              8-digit hierarchical event code — digits 1-2 L1 Category,
              3-4 L2 Sub-category, 5-6 L3 Action, 7-8 L4 Result
              (01=Success, 02=Fail, 00=N/A). String — leading zeros matter.
          - name: response
            description: >
              Event payload — NOT JSON. Format varies by event family:
              kv CSV (Catalog View 19010000, barcode 18010000), positional
              CSV order metadata (04xx/05xx/06xx), Time:s duration (03xx
              download successes), bare SKU/title/'Fail', or empty.
          - name: device_name
            description: alias-model, e.g. D8FA89-iPad Pro 12.9 3rd
          - name: created_at
            description: Server time in FIXED PST (UTC-8, no DST) — authoritative for ordering/dedup
          - name: updated_at
            description: Server time in fixed PST; latest wins on dedup
          - name: event_id
            description: Epoch milliseconds (string) — device-side event timestamp; nullable
