version: 2

# Column descriptions: inline if unique to this column; shared text (used by 2+
# columns) lives in models/docs/_mysql_glossary.md as a {% docs %} block and is
# referenced via {{ doc('mysql_src__<name>') }}. Edit shared defs there.

sources:
  - name: mysql
    description: >
      UST website MySQL database. All tables are READ-ONLY for dbt. The source
      location is target-dependent:
        DuckDB (dev):     external_location reads the API JSON in data/mock/mysql/raw_api/;
                          schema/identifier are symbolic. admin_users and category
                          have no sample, so their staging models return empty.
        Databricks (POC): reads the real MySQL tables mirrored into the `mysql`
                          schema of catalog ust_databricks (one Delta table per
                          MySQL table, same names). external_location is ignored.
      Switch a table's source by editing its identifier; the schema flips to
      `mysql` automatically on the databricks target.
    tags: ["raw", "mysql"]
    # Pin the catalog explicitly on databricks so resolution does not depend on
    # the connection's default catalog (which can fall back to hive_metastore).
    database: "{{ 'ust_databricks' if target.type == 'databricks' else target.database }}"
    schema: "{{ 'mysql' if target.type == 'databricks' else 'temp_mysql' }}"
    config:
      meta:
        access: read_only
        source_system: mysql

    tables:
      - name: system_event_log
        identifier: "{{ 'ust_system_event_log' if target.type == 'databricks' else 'temp_system_events' }}"
        description: >
          Application and backend event logs with L1-L4 hierarchical event codes.
          DuckDB reads the nested API envelope {code, msg, data: {data: [events]}}
          and the staging model unnests it. Databricks reads the pre-flattened
          temp_system_events table (one row per event); staging skips the unnest.
        config:
          external_location: "read_json_auto('data/mock/mysql/raw_api/system/event/log/raw_log.json')"
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 72, period: hour}
        columns:
          - name: entity_id
            description: Primary key
          - name: sales_code
            description: Salesperson code
          - name: username
            description: >
              Salesperson login on sales apps; customer account no. on customer apps
          - name: ust_customer_no
            description: Customer the salesperson is acting for (empty if not applicable)
          - name: event_time
            description: Device LOCAL time — convert to UTC using timezone offset
          - name: description_code
            description: 8-digit hierarchical event code (L1-L2-L3-L4)
          - name: response
            description: Event payload string (NOT JSON — format varies by event family)
          - name: event_id
            description: Epoch milliseconds string — device-side timestamp
          - name: device_name
            description: Device alias-model string
          - name: location
            description: '"lat,lon" or empty'
          - name: timezone
            description: Device UTC offset string, e.g. GMT-5
          - name: source
            description: App source code (PDA-A, CatalogFC-*, etc.)
          - name: version
            description: App version string
          - name: created_at
            description: Server time in fixed PST (UTC-8, no DST) — authoritative for ordering
          - name: updated_at
            description: Server time in fixed PST; latest wins on dedup

      - name: admin_users
        identifier: "{{ 'ust_admin_users' if target.type == 'databricks' else 'temp_admin_users' }}"
        description: >
          Administrator and salesperson master data. Links to other tables via
          username or salesperson_code. No local JSON sample — on DuckDB reads
          mock parquet (data/mock/mysql/, generated by
          scripts/generate_jdawms_mock.py with usernames matching the local
          activity sample); reads the real table on the databricks target.
        config:
          external_location: "read_parquet('data/mock/mysql/ust_admin_users.parquet')"
        columns:
          - name: user_id
            description: Primary key
          - name: firstname
            description: First name
          - name: lastname
            description: Last name
          - name: email
            description: Email address
          - name: username
            description: Login account — links to system_event_log.username
          - name: created
            description: Record creation time
          - name: modified
            description: Record last update time (on update CURRENT_TIMESTAMP)
          - name: logdate
            description: Last login timestamp
          - name: lognum
            description: Login count
          - name: is_active
            description: Active flag (smallint 0/1)
          - name: interface_locale
            description: Admin UI locale
          - name: is_salesperson
            description: Salesperson flag (smallint 0/1)
          - name: salesperson_code
            description: Sales territory code — links to system_event_log.sales_code
          - name: convert_quotes
            description: Convert-quotes permission flag (smallint 0/1)
          - name: receive_quote_emails
            description: Receive-quote-emails flag (smallint 0/1)
          - name: role_name
            description: Role (admin, salesperson, etc.)

      - name: category
        identifier: "{{ 'ust_category' if target.type == 'databricks' else 'temp_category' }}"
        description: >
          Product category master data. No local JSON sample — on DuckDB reads
          mock parquet (data/mock/mysql/, generated by
          scripts/generate_jdawms_mock.py from seed_categories so ids/names
          line up); reads the real table on the databricks target.
        config:
          external_location: "read_parquet('data/mock/mysql/ust_category.parquet')"
        columns:
          - name: category_id
            description: Primary key
          - name: parent_id
            description: FK to parent category (0 for root categories)
          - name: name
            description: Category display name
          - name: is_active
            description: Active flag (stored as varchar in this table)
          - name: position
            description: Sort position within the parent
          - name: level
            description: Hierarchy depth (0 = root)
          - name: product_count
            description: Number of products in the category
          - name: meta_title
            description: SEO meta title
          - name: meta_keywords
            description: SEO meta keywords
          - name: meta_description
            description: SEO meta description
          - name: create_at
            description: Record creation time (note — DB typo, missing 'd')
          - name: updated_at
            description: "{{ doc('mysql_src__updated_at') }}"
