version: 2

# Column descriptions: inline if unique to this column; shared text (used by 2+
# columns) lives in models/docs/_mysql_glossary.md as a {% docs %} block and is
# referenced via {{ doc('mysql__<name>') }}. Edit shared defs there.

models:
  - name: stg_mysql__system_event_log
    description: >
      Lossless 1:1 staging for system_event_log. One row per entity_id (latest
      updated_at wins). Light work only — cast, trim, dedupe; every source field
      is preserved with its source name. All decoding (description_code split,
      event_time→UTC, location parse, source decode) lives in int_events_decoded.
      Raw API response has a nested envelope — staging handles unnesting; remove
      the duckdb unnest branch when reading directly from MySQL.
    columns:
      - name: entity_id
        description: Primary key. One row per system event.
        tests: [unique, not_null]
      - name: sales_code
        description: Sales team / territory code associated with the account that generated the event.
      - name: username
        description: >
          Login account name. Salesperson login on sales apps (PDA, CatalogFS);
          customer account number on customer apps (Vegas, CatalogFC, CatalogSE, Web).
      - name: ust_customer_no
        description: Customer number the sales user is operating on behalf of; empty for customer apps or when none selected.
      - name: location
        description: GPS coordinates as "latitude,longitude"; empty when Geo is N/A or no fix.
      - name: timezone
        description: Device local UTC offset string at event time, e.g. GMT+8.
      - name: event_time
        description: >
          Device LOCAL time the event occurred, kept as a raw string (format
          varies by source — epoch on live MySQL, datetime string in the sample).
          Parsed and converted to UTC downstream in int_events_decoded via timezone.
      - name: source
        description: Originating app + platform variant. Raw source code, e.g. CatalogFS-I, PDA-A, Web.
        tests: [not_null]
      - name: version
        description: App version string at event time. Format major.minor.buildcode.
      - name: description_code
        description: >
          8-digit hierarchical event code (L1-L2-L3-L4). Dictionary relationship
          + accepted source values are tested on int_events_decoded, where the
          code is decoded and renamed.
        tests: [not_null]
      - name: response
        description: Event payload string. Not JSON; format varies by event family. Parsed downstream.
      - name: device_name
        description: Device alias/UUID prefix + hardware model, e.g. "D8FA89-iPad Pro 12.9 3rd".
      - name: created_at
        description: Server-side write time in PST (UTC-8, no DST). Authoritative for ordering.
      - name: updated_at
        description: Server-side last-update time in PST. Latest wins on dedup.
      - name: event_id
        description: Device-side event identifier (epoch milliseconds string); empty on some events.

  - name: stg_mysql__admin_users
    description: >
      Staging for admin_users (salesperson + admin master data). Lossless 1:1 with
      the source (all 16 columns). Cast, trim, rename to analytics-friendly names
      (firstname→first_name, created→created_at, modified→updated_at). Derived
      fields (full_name concatenation) belong in the int layer. No local JSON
      sample — returns an empty schema-correct result on duckdb; reads the real
      ust_databricks.mysql.admin_users table on the databricks target.
    columns:
      - name: user_id
        description: Primary key.
        tests: [unique, not_null]
      - name: username
        description: Login account. Links to system_event_log.username.
      - name: first_name
        description: First name. Source column is `firstname`.
      - name: last_name
        description: Last name. Source column is `lastname`.
      - name: email
        description: Email address.
      - name: salesperson_code
        description: Sales territory code. Links to system_event_log.sales_code.
      - name: role_name
        description: Role such as admin or salesperson.
      - name: interface_locale
        description: Admin UI locale.
      - name: is_active
        description: Active flag (bigint 0/1). Source type is smallint.
      - name: is_salesperson
        description: Salesperson flag (bigint 0/1). Source type is smallint.
      - name: convert_quotes
        description: Convert-quotes permission flag (bigint 0/1).
      - name: receive_quote_emails
        description: Receive-quote-emails flag (bigint 0/1).
      - name: lognum
        description: Login count (bigint).
      - name: logdate
        description: Last login timestamp.
      - name: created_at
        description: Record creation time. Source column is `created`.
      - name: updated_at
        description: Record last update time. Source column is `modified`.

  - name: stg_mysql__category
    description: >
      Staging for category (product category master data). Lossless 1:1 with the
      source (all 12 columns). Cast, trim, rename to analytics-friendly names.
      Parent category resolution via self-join belongs in the int layer. No local
      JSON sample — returns an empty schema-correct result on duckdb; reads the real
      ust_databricks.mysql.category table on the databricks target.
    columns:
      - name: entity_id
        description: Primary key. Source column is `category_id`.
        tests: [unique, not_null]
      - name: parent_id
        description: FK to parent category entity_id. 0 for root categories.
      - name: category_name
        description: Category display name. Source column is `name`.
      - name: is_active
        description: Active flag (stored as varchar in this source table).
      - name: position
        description: Sort position within the parent (bigint).
      - name: category_level
        description: Hierarchy depth (bigint). 0 is root. Source column is `level`.
      - name: product_count
        description: Number of products in the category (bigint).
      - name: meta_title
        description: SEO meta title.
      - name: meta_keywords
        description: SEO meta keywords.
      - name: meta_description
        description: SEO meta description.
      - name: created_at
        description: "{{ doc('mysql__created_at_typo') }}"
      - name: updated_at
        description: Record last update time.
