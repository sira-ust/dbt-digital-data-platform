version: 2

# Column descriptions: inline if unique to this column; shared text (used by 2+
# columns) lives in models/docs/_mysql_glossary.md as a {% docs %} block and is
# referenced via {{ doc('mysql__<name>') }}. Edit shared defs there.

models:
  - name: stg_mysql__tracking_report
    description: >
      Staging for tracking_report (customer app sessions). One row per entity_id
      (latest updated_at wins). Cast, trim, dedupe, rename to analytics-friendly
      names. Complex derivations (session duration, version parsing) belong in
      the int layer.
    columns:
      - name: entity_id
        description: Primary key. One row per customer session.
        tests: [unique, not_null]
      - name: customer_id
        description: "{{ doc('mysql__customer_id') }}"
      - name: customer_name
        description: Customer name.
      - name: session_id
        description: "{{ doc('mysql__session_id_unpopulated') }}"
      - name: device_model
        description: Device model. Source column is `model`.
      - name: app_version
        description: Application version string. Source column is `version`.
      - name: start_time
        description: Session start time (device local).
      - name: end_time
        description: Session end time (device local).
      - name: total_events
        description: Number of events in the session. Source column is `total_event`.
      - name: created_at
        description: "{{ doc('mysql__created_at_typo') }}"
      - name: updated_at
        description: "{{ doc('mysql__updated_at_dedup') }}"

  - name: stg_mysql__tracking_report_event
    description: >
      Staging for tracking_report_event (customer app events). One row per
      entity_id (latest updated_at wins). Cast, trim, dedupe, rename to
      analytics-friendly names. Event label decoding belongs in the int layer.
    columns:
      - name: entity_id
        description: Primary key. One row per customer event.
        tests: [unique, not_null]
      - name: tracking_report_id
        description: FK to stg_mysql__tracking_report.entity_id. Source column is `parent_id`.
        tests:
          - relationships:
              arguments:
                to: ref('stg_mysql__tracking_report')
                field: entity_id
              config:
                severity: warn
      - name: customer_id
        description: "{{ doc('mysql__customer_id') }}"
      - name: customer_name
        description: Customer name (usually empty at event level).
      - name: event_type_code
        description: Event type code. Source column is `type`.
      - name: title
        description: Page or product title.
      - name: start_time
        description: Event start time (device local).
      - name: end_time
        description: Event end time (device local).
      - name: item_no
        description: Item number.
      - name: sku
        description: "{{ doc('mysql__sku') }}"
      - name: qty
        description: "{{ doc('mysql__qty') }}"
      - name: quote_id
        description: Quote identifier.
      - name: keyword
        description: "{{ doc('mysql__keyword') }}"
      - name: page
        description: Current page name.
      - name: event_type
        description: Business event type label.
      - name: notes
        description: Free-text notes.
      - name: address
        description: Address string.
      - name: source
        description: Event source label.
      - name: duration_seconds
        description: Event duration in seconds (bigint). Source column is `second`.
      - name: method
        description: "{{ doc('mysql__method') }}"
      - name: categories_name
        description: Product category name.
      - name: icon
        description: Icon identifier.
      - name: timezone
        description: "{{ doc('mysql__timezone') }}"
      - name: app_version
        description: App version (usually empty at event level). Source column is `version`.
      - name: created_at
        description: "{{ doc('mysql__created_at_typo') }}"
      - name: updated_at
        description: "{{ doc('mysql__updated_at_dedup') }}"

  - name: stg_mysql__user_activity_report
    description: >
      Staging for user_activity_report (salesperson login sessions). One row per
      entity_id (latest updated_at wins). Cast, trim, dedupe, rename to
      analytics-friendly names. Location parsing and session metrics belong in
      the int layer.
    columns:
      - name: entity_id
        description: Primary key. One row per salesperson session.
        tests: [unique, not_null]
      - name: username
        description: "{{ doc('mysql__username_user') }}"
      - name: user_name
        description: Salesperson display name with code prefix.
      - name: session_id
        description: "{{ doc('mysql__session_id_unpopulated') }}"
      - name: begin_time
        description: Login / session start time.
      - name: end_time
        description: Logout / session end time (null if still active).
      - name: event_count
        description: Number of recorded actions in the session (bigint).
      - name: voluntarily_exit
        description: Whether the user exited normally (bigint 0/1).
      - name: device_model
        description: Device model. Source column is `model`.
      - name: location
        description: GPS coordinates at session start ("lat,lon" or null).
      - name: sales_name
        description: Sales territory name (currently null).
      - name: app_version
        description: App version string. Source column is `version`.
      - name: created_at
        description: Record creation time.
      - name: updated_at
        description: "{{ doc('mysql__updated_at_dedup') }}"

  - name: stg_mysql__user_activity_report_event
    description: >
      Staging for user_activity_report_event (salesperson activity events).
      Lossless 1:1 with the real MySQL table (24 columns). One row per entity_id
      (latest updated_at wins). Cast, trim, dedupe, rename to analytics-friendly
      names. Location parsing and activity label decoding belong in the int layer.
      Source has updated_at but no created_at. The table carries no sales_code /
      app_version — territory is resolved from admin_users and app_version from
      the user_activity_report header in int_rep_activity_events. The local JSON
      sample has no `layout` column, so it is emitted as NULL on the duckdb target.
    columns:
      - name: entity_id
        description: Primary key. One row per salesperson event.
        tests: [unique, not_null]
      - name: user_activity_report_id
        description: FK to stg_mysql__user_activity_report.entity_id. Source column is `report_entity_id`.
        tests:
          - relationships:
              arguments:
                to: ref('stg_mysql__user_activity_report')
                field: entity_id
              config:
                severity: warn
      - name: username
        description: "{{ doc('mysql__username_user') }}"
      - name: activity_type
        description: Activity type code. Source column is `act_type`.
      - name: begin_time
        description: Activity start time.
      - name: end_time
        description: Activity end time (null when not ended).
      - name: customer
        description: Customer being visited (if applicable).
      - name: keyword
        description: "{{ doc('mysql__keyword') }}"
      - name: location
        description: GPS coordinates ("lat,lon" or null).
      - name: layout
        description: UI layout context. NULL on the duckdb target (absent from the JSON sample).
      - name: category
        description: Product category context.
      - name: visits_num
        description: Visit sequence number (bigint).
      - name: sku
        description: "{{ doc('mysql__sku') }}"
      - name: title
        description: Activity label.
      - name: qty
        description: "{{ doc('mysql__qty') }}"
      - name: response
        description: API response payload.
      - name: battery
        description: Device battery level percentage (bigint).
      - name: is_wifi
        description: Wi-Fi status (bigint 0/1).
      - name: is_done
        description: Whether activity was completed (bigint 0/1).
      - name: is_login
        description: Whether this is a login event (bigint 0/1).
      - name: device_space
        description: Available device storage.
      - name: timezone
        description: "{{ doc('mysql__timezone') }}"
      - name: method
        description: "{{ doc('mysql__method') }}"
      - name: updated_at
        description: "{{ doc('mysql__updated_at_dedup') }}"

  - name: stg_mysql__system_event_log
    description: >
      Lossless 1:1 staging for system_event_log. One row per entity_id (latest
      updated_at wins). Light work only — cast, trim, dedupe; every source field
      is preserved with its source name. All decoding (description_code split,
      event_time→UTC, location parse, source decode) lives in int_events_decoded.
      Raw API response has a nested envelope — staging handles unnesting; remove
      the duckdb unnest branch when reading directly from MySQL.
    columns:
      - name: entity_id
        description: Primary key. One row per system event.
        tests: [unique, not_null]
      - name: sales_code
        description: Sales team / territory code associated with the account that generated the event.
      - name: username
        description: >
          Login account name. Salesperson login on sales apps (PDA, CatalogFS);
          customer account number on customer apps (Vegas, CatalogFC, CatalogSE, Web).
      - name: ust_customer_no
        description: Customer number the sales user is operating on behalf of; empty for customer apps or when none selected.
      - name: location
        description: GPS coordinates as "latitude,longitude"; empty when Geo is N/A or no fix.
      - name: timezone
        description: Device local UTC offset string at event time, e.g. GMT+8.
      - name: event_time
        description: >
          Device LOCAL time the event occurred, kept as a raw string (format
          varies by source — epoch on live MySQL, datetime string in the sample).
          Parsed and converted to UTC downstream in int_events_decoded via timezone.
      - name: source
        description: Originating app + platform variant. Raw source code, e.g. CatalogFS-I, PDA-A, Web.
        tests: [not_null]
      - name: version
        description: App version string at event time. Format major.minor.buildcode.
      - name: description_code
        description: >
          8-digit hierarchical event code (L1-L2-L3-L4). Dictionary relationship
          + accepted source values are tested on int_events_decoded, where the
          code is decoded and renamed.
        tests: [not_null]
      - name: response
        description: Event payload string. Not JSON; format varies by event family. Parsed downstream.
      - name: device_name
        description: Device alias/UUID prefix + hardware model, e.g. "D8FA89-iPad Pro 12.9 3rd".
      - name: created_at
        description: Server-side write time in PST (UTC-8, no DST). Authoritative for ordering.
      - name: updated_at
        description: Server-side last-update time in PST. Latest wins on dedup.
      - name: event_id
        description: Device-side event identifier (epoch milliseconds string); empty on some events.

  - name: stg_mysql__admin_users
    description: >
      Staging for admin_users (salesperson + admin master data). Lossless 1:1 with
      the source (all 16 columns). Cast, trim, rename to analytics-friendly names
      (firstname→first_name, created→created_at, modified→updated_at). Derived
      fields (full_name concatenation) belong in the int layer. No local JSON
      sample — returns an empty schema-correct result on duckdb; reads the real
      ust_databricks.mysql.admin_users table on the databricks target.
    columns:
      - name: user_id
        description: Primary key.
        tests: [unique, not_null]
      - name: username
        description: Login account. Links to user_activity_report.username and system_event_log.username.
      - name: first_name
        description: First name. Source column is `firstname`.
      - name: last_name
        description: Last name. Source column is `lastname`.
      - name: email
        description: Email address.
      - name: salesperson_code
        description: Sales territory code. Links to system_event_log.sales_code.
      - name: role_name
        description: Role such as admin or salesperson.
      - name: interface_locale
        description: Admin UI locale.
      - name: is_active
        description: Active flag (bigint 0/1). Source type is smallint.
      - name: is_salesperson
        description: Salesperson flag (bigint 0/1). Source type is smallint.
      - name: convert_quotes
        description: Convert-quotes permission flag (bigint 0/1).
      - name: receive_quote_emails
        description: Receive-quote-emails flag (bigint 0/1).
      - name: lognum
        description: Login count (bigint).
      - name: logdate
        description: Last login timestamp.
      - name: created_at
        description: Record creation time. Source column is `created`.
      - name: updated_at
        description: Record last update time. Source column is `modified`.

  - name: stg_mysql__category
    description: >
      Staging for category (product category master data). Lossless 1:1 with the
      source (all 12 columns). Cast, trim, rename to analytics-friendly names.
      Parent category resolution via self-join belongs in the int layer. No local
      JSON sample — returns an empty schema-correct result on duckdb; reads the real
      ust_databricks.mysql.category table on the databricks target.
    columns:
      - name: entity_id
        description: Primary key. Source column is `category_id`.
        tests: [unique, not_null]
      - name: parent_id
        description: FK to parent category entity_id. 0 for root categories.
      - name: category_name
        description: Category display name. Source column is `name`.
      - name: is_active
        description: Active flag (stored as varchar in this source table).
      - name: position
        description: Sort position within the parent (bigint).
      - name: category_level
        description: Hierarchy depth (bigint). 0 is root. Source column is `level`.
      - name: product_count
        description: Number of products in the category (bigint).
      - name: meta_title
        description: SEO meta title.
      - name: meta_keywords
        description: SEO meta keywords.
      - name: meta_description
        description: SEO meta description.
      - name: created_at
        description: "{{ doc('mysql__created_at_typo') }}"
      - name: updated_at
        description: Record last update time.
