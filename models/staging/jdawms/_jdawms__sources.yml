          - name: rptuom
            description: "Report UOM — The uom that this item used to report. It should be UOM defined in itmftp_dtl."
          - name: dte_win_typ
            description: "Date Window Type selected for the part. This can have Manufacture Date Window or Expiration Date Window or FIFO Window."
          - name: dte_code
            description: "Date Code — This will describe whether the part is Manufacture Date (M) or Expiration Date (E) or Both (B) tracked. If the part is not date tracked, its value will be null."
