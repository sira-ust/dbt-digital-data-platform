            description: "Origin Code — If set, the system will track origin code for this product."
          - name: revflg
            description: "Revision — If set, the system will track revision level for this product."
          - name: lotflg
            description: "Lot Tracking — If set, the system will track lot number for this product."
          - name: sup_lot_flg
            description: "Supplier Lot Tracking — If set, the system will track supplier lot number for this product."
          - name: stkuom
