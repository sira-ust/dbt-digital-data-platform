            description: "Unique Pallet ID — Pallet ID that uniquely identifies the pallet to the PalletCtl system."
          - name: palctlsts
            description: "PalletCtl status. DONE(PalletCtl finished),WPPP(Waiting PalletCtl,pcksts=P),WPPH(Waiting PalletCtl,pcksts=H),WSTP(Waiting Shorts,pcksts=P),WSTH(Waiting Shorts,pcksts=H),WXDP(Waiting XDCK,pcksts=P),WXDH(Waiting XDCK,pcksts=H)."
          - name: start_pal_flg
            description: "Starter Pallet — Used with PalletCTL to indicate this pick is a starter pallet."
          - name: list_conf_flg
            description: "List Confirm Flag — Mark records which need to have the inventory moved from a temporary load to the main pick to load. After the pick is confirmed, the flag will be unset."
          - name: pck_uom
            description: "Picking UOM — UOM set according to pckqty when created in allocating inventory. Represents at which UOM level shoud user pick the inventory."
          - name: assign_grp
