          - name: fifwin
            description: "Window — Used to indicate the time interval in which product should be considered equal for FIFO consideration during product storage. The unit of measure of the time interval is based on the TIMCOD field."
          - name: velzon
            description: "Velocity — Used to indicate the relative velocity of the product and how it should be stored. I.e. fast moving product should be stored in easy to access fast moving locations."
          - name: rcvsts
            description: "Receive Status — The default inventory status that this product should get when identified during receiving."
          - name: rcvflg
            description: "Receivable — This flag must be set for product to be identified during receiving. Useful if items downloads from host often need addtln info. New items may be downloaded with rcvflg set to false to prevent rcv'ng until someone manually intervenes."
          - name: prdflg
            description: "Production Inventory — This flag is set if this is inventory that a host system cares about. When tracking supplies and other non-costed items, this flag should be set to false."
          - name: wgtcod
            description: "Weight Code — The weight Code - This is a user defined code for the describing the weight type, usually takes the values HEAVY, MEDIUM or LIGHT."
          - name: prtfit
