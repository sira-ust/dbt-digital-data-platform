      - name: locmst
        description: "Location master — every storage location (slot) in the warehouse with its area, dimensions, and control flags."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 168, period: hour}
        columns:
          - name: stoloc
            description: "Location — Uniquely identifies the storage location."
          - name: wh_id
            description: "Warehouse ID - The warehouse where the aisle is located."
          - name: arecod
            description: "Area — Defines the area to which this location belongs."
          - name: loccod
            description: "Location Capacity Code — Specifies if locations are tracked at a unit quantity (Q), volume(V), length (L), case dimension(C) or pallet footprint(P) level."
          - name: locsts
            description: "Location Status — Current disposition of the location. One of: Full (F), Partial (P), Empty (E) or Inventory Error (I)."
          - name: velzon
            description: "Velocity — The velocity zone of the location."
          - name: aisle_id
            description: "Aisle ID - A collection of locations in a row."
          - name: trvseq
            description: "Travel Sequence — The relative distance between locations, the travel sequence is during work management to find the closest location to an idle user."
          - name: sto_seq
            description: "Storage Sequence is used to influence how locations are ordered when they are considered for inbound inventory during Putaway."
          - name: rescod
            description: "Shipping Resource Code — Used to path inventory through processing locations. The resource code is a mechanism by which that location is reserved for product matching the rescod. For example, in a shipment staging lane, the rescod is often set to the carcod."
          - name: bay
            description: "Bay — The bay the location belongs to."
          - name: lvl
            description: "Level — The level in the rack the location is on."
          - name: locpos
            description: "Location Position — The position of the location respective to it's level."
          - name: lochgt
            description: "Location Height — This represents the hgt (in the same units as used on the ftpmst table) of product that the loc will tolerate. This is evaluated on a per storage request. For example, in a pallet racking example, the lochgt may be set to 90 (inches)."
          - name: loclen
            description: "Location Length — This field is currently NOT used for storage selection or volume calculation purposes and is only used during 3PL Billing operations."
          - name: locwid
            description: "Location Width — This field is currently NOT used for storage selection or volume calculation purposes and is only used during 3PL Billing operations."
          - name: dck_acc_cod
            description: "Dock access code."
          - name: locvrc
            description: "Verification Code — A 'checksum' or alternate identifier which may be used to identify the location. This is often used in facilities where locations may not be able to be labeled and it is desired to provide an alternate, easy to type, name for the loc."
          - name: maxqvl
            description: "Maximum Capacity — The loccod will indicate what this number actually means (in terms of volume, pallets, etc...). This represents the maximum storage capacity of the location."
          - name: curqvl
            description: "Used Capacity — Much the same as maxqvl, this field is used to indicate the currently used capacity in a location."
          - name: pndqvl
            description: "Pending Capacity — Much the same as the other 'qvl' numbers, this field is used to indicate how much capacity is pending storage to the location."
          - name: trfpct
            description: "Top-Off Replenishment Percent — Indicates what percentage of the maxqvl should be used when performing top-off replenishments. A value of 0 will indicate 100%. 50 will indicate half full. This can be useful if it is desired to 'overfill' a loc during repl process."
          - name: erfpct
            description: "Emergency Replenishment Percent — Much the same as trfpct, this field indicates the percentage of maxqvl which should be used during emergency replenishment operations."
          - name: esc_type
            description: "Escalation Type - Location capacity escalation type."
          - name: esc_thr
            description: "Escalation Threshold - Escalation Threshold."
          - name: useflg
            description: "Location Usable — This flag indicates that the location is usable. If set to false, future allocations and stores are disabled at this location."
          - name: stoflg
            description: "Storable — This flag indicates that the location is available for storage operations."
          - name: pckflg
            description: "Pickable — This flag indicates that the location is available for picking (allocation) operations."
          - name: repflg
            description: "Replenishment — This flag indicates that the location may be replenished."
          - name: asgflg
            description: "Assignment — This flag indicates that this loc is permanently assigned. In processing area, it applies to rescod value that is set. In normal sto. areas, it indicates itmnum is assigned to loc. STORE-ASG-LOC policies tells the item that is assigned."
          - name: cipflg
            description: "Count In Progress — This flag indicates that there is a count in-progress at this location."
          - name: cntseq
            description: "Count Sequence — Much like travel sequence, this field is used to sequence counting activities."
          - name: numcnt
            description: "Number of Counts — Operational column used to track the number of counts performed during a particular cycle. Used when location based cycle counting is in effect."
          - name: abccod
            description: "ABC Code — Used to schedule location based cycle counts much in the same was as the itmmst.abccod is used."
          - name: cntdte
            description: "Count Date — Date location was last counted."
          - name: devcod
            description: "Device Code — Label device which is closest to this location."
          - name: lokcod
            description: "Location Lock Code — Used to indicate that this loc is locked for processing. Often used by operational programs such as order overpack operations to indicate that a work station is processing a particular lane - this prevents collisions during processing."
          - name: locacc
            description: "Location Access — Used to indicate that special vehicle access is necessary to get to this location. This is used by the work manangement system to ensure that work is only sent to devices if the device can access the location."
          - name: voc_chkdgt
            description: "Voice Check Digit - This will be a short code that will be used in voice to identify a location."
          - name: voc_chkdgt_2
            description: "Voice Check Digit 2 - This will be a short code that will be used in voice to identify a location in addition to the standard Check Digit, used when the check digit rotation policy is configured."
          - name: voc_chkdgt_3
            description: "Voice Check Digit 3 - This will be a short code that will be used in voice to identify a location in addition to the standard Check Digit, used when the check digit rotation policy is configured."
