          - name: unassign_flg
            description: "Manually Replan To List — When Un-Assign Flag is checked, the pick has been un-assigned."
          - name: asset_typ
            description: "Handling Unit Type — Asset Type - Asset Type to be picked. But system will NOT force user to Pick the particular Asset type on the table."
          - name: supnum
            description: "Supplier Number: Supplier number specific to the pick."
          - name: supflg
            description: "Confirm Supplier — Supplier Flag: Confirm supplier number on pickup."
