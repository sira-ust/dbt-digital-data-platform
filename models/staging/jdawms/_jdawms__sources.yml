version: 2

# Column descriptions are GENERATED from seeds/seed_jdawms_data_dictionary.csv
# by scripts/generate_jdawms_glossary.py: inline if the meaning is unique to
# this column, or a {{ doc('jdawms__<column>') }} ref into
# models/docs/_jdawms_glossary.md when 2+ tables share the same meaning.
# Do not hand-edit descriptions here — update the seed and re-run the script.

sources:
  - name: jdawms
    description: >
      JDA / Blue Yonder WMS (jdawmsrep) replication feed, landed into Unity Catalog
      catalog ust_databricks, schema jdawmsrep, via Azure Blob ingestion. All tables
      are READ-ONLY. `loaddate` is the ingestion watermark. Databricks-only source:
      there is no local DuckDB sample, so jdawms staging is gated to the databricks target.
    database: ust_databricks
    schema: jdawmsrep
    config:
      tags: ["raw", "jdawms", "wms"]
      meta:
        access: read_only
        source_system: jdawms
        doc_status: sme_verified   # from WMS data dictionary (seed_jdawms_data_dictionary); 24 empty-comment + ingestion columns retain prior AI text
    tables:
      - name: dlytrn
        description: "Daily inventory transaction log — one row per stock movement/adjustment (receipt, pick, putaway, transfer). The WMS activity ledger."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 48, period: hour}
        columns:
          - name: dlytrn_id
            description: "Daily Transaction ID — Daily trnsaction ID."
          - name: trndte
            description: "Transaction Date — The date and time the activity occurred."
          - name: oprcod
            description: "Operation Code — The operation code of the transaction."
          - name: actcod
            description: "Activity Code — The activity code of the transaction."
          - name: lodnum
            description: "{{ doc('jdawms__lodnum') }}"
          - name: subnum
            description: "{{ doc('jdawms__subnum') }}"
          - name: dtlnum
            description: "Detail LPN — Uniquely identified invdtl record."
          - name: to_lodnum
            description: "To Load Number — Uniquely identifies destination invlod record. In many systems, this value is the same as the label on a pallet."
          - name: to_subnum
            description: "To Case Identifier — Uniquely identified destination invsub record."
          - name: to_dtlnum
            description: "To Piece Identifier — Uniquely identified destination invdtl record."
          - name: prtnum
            description: "{{ doc('jdawms__prtnum__dlytrn') }}"
          - name: prt_client_id
            description: "{{ doc('jdawms__prt_client_id') }}"
          - name: orgcod
            description: "Origin Code of the inventory tracked by this detail. If this item is not origin code tracked, then this field will take on a default value of '----'."
          - name: revlvl
            description: "Revision level of the inventory tracked by this detail. If this item is not revision level tracked, then this field will take on a default value of '----'."
          - name: lotnum
            description: "Lot number of the inventory tracked by this detail. If this item is not lot number tracked, then this field will take on a default value of '----'."
          - name: sup_lotnum
            description: "Supplier Lot Number — Lot number supplied by the supplier for tracking purposes."
          - name: supnum
            description: "Supplier Number : The supplier number of the inventory tracked by this detail."
          - name: inv_attr_str1
            description: "Inventory Attribute Text 1 of the inventory tracked by this detail."
          - name: inv_attr_str2
            description: "Inventory Attribute Text 2 of the inventory tracked by this detail."
          - name: inv_attr_str3
            description: "Inventory Attribute Text 3 of the inventory tracked by this detail."
          - name: inv_attr_str4
            description: "Inventory Attribute Text 4 of the inventory tracked by this detail."
          - name: inv_attr_str5
            description: "Inventory Attribute Text 5 of the inventory tracked by this detail."
          - name: inv_attr_str6
            description: "Inventory Attribute Text 6 of the inventory tracked by this detail."
          - name: inv_attr_str7
            description: "Inventory Attribute Text 7 of the inventory tracked by this detail."
          - name: inv_attr_str8
            description: "Inventory Attribute Text 8 of the inventory tracked by this detail."
          - name: inv_attr_str9
            description: "Inventory Attribute Text 9 of the inventory tracked by this detail."
          - name: inv_attr_str10
            description: "Inventory Attribute Text 10 of the inventory tracked by this detail."
          - name: inv_attr_str11
            description: "Inventory Attribute Text 11 of the inventory tracked by this detail."
          - name: inv_attr_str12
            description: "Inventory Attribute Text 12 of the inventory tracked by this detail."
          - name: inv_attr_str13
            description: "Inventory Attribute Text 13 of the inventory tracked by this detail."
          - name: inv_attr_str14
            description: "Inventory Attribute Text 14 of the inventory tracked by this detail."
          - name: inv_attr_str15
            description: "Inventory Attribute Text 15 of the inventory tracked by this detail."
          - name: inv_attr_str16
            description: "Inventory Attribute Text 16 of the inventory tracked by this detail."
          - name: inv_attr_str17
            description: "Inventory Attribute Text 17 of the inventory tracked by this detail."
          - name: inv_attr_str18
            description: "Inventory Attribute Text 18 of the inventory tracked by this detail."
          - name: inv_attr_int1
            description: "Inventory Attribute Number 1 of the inventory tracked by this detail."
          - name: inv_attr_int2
            description: "Inventory Attribute Number 2 of the inventory tracked by this detail."
          - name: inv_attr_int3
            description: "Inventory Attribute Number 3 of the inventory tracked by this detail."
          - name: inv_attr_int4
            description: "Inventory Attribute Number 4 of the inventory tracked by this detail."
          - name: inv_attr_int5
            description: "Inventory Attribute Number 5 of the inventory tracked by this detail."
          - name: inv_attr_flt1
            description: "Unit Cost — Inventory Attribute Decimal 1 of the inventory tracked by this detail."
          - name: inv_attr_flt2
            description: "Inventory Attribute Decimal 2 of the inventory tracked by this detail."
          - name: inv_attr_flt3
            description: "Inventory Attribute Decimal 3 of the inventory tracked by this detail."
          - name: inv_attr_dte1
            description: "Inventory Attribute Date 1 of the inventory tracked by this detail."
          - name: inv_attr_dte2
            description: "Inventory Attribute Date 2 of the inventory tracked by this detail."
          - name: movref
            description: "Move Reference — The move reference of the transaction. This reference is used internally by the system to show what type of inventory move occurred."
          - name: reacod
            description: "Reason Code — The reason code assigned to the transaction."
          - name: trnqty
            description: "Quantity — The unit quantity affected by this transaction."
          - name: catch_qty
            description: "Catch Quantity — The catch qty a user may enter per stocking unit of measure."
          - name: traknm
            description: "Tracking Number : The number which is generated by the parcel manifesting system and is used by parcel carriers to track the package."
          - name: catch_unttyp
            description: "Catch Unit Type — The metric that catch units are captured in."
          - name: fr_arecod
            description: "From Area — The source area code of the transaction."
          - name: frstol
            description: "From Location — The source location of the transaction."
          - name: frinvs
            description: "From Inv Status — The original inventory status of the inventory affected by this transaction."
          - name: fr_age_pflnam
            description: "From Aging Profile — The original aging profile of the inventory affected by this transaction."
          - name: to_arecod
            description: "To Area — The destination area code of the transaction."
          - name: tostol
            description: "To Location — The destination location of the transaction."
          - name: toinvs
            description: "To Inv Status — The final inventory status of the inventory affected by this transaction."
          - name: to_age_pflnam
            description: "To Aging Profile — The final aging profile of the inventory affected by this transaction."
          - name: trlr_num
            description: "Transport Equipment Number — The trailer number of the trailer."
          - name: trct_num
            description: "The tractor number of the trailer."
          - name: carcod
            description: "Carrier — The carrier code of the trailer."
          - name: ship_id
            description: "Shipment ID — The shipment ID the order was on."
          - name: client_id
            description: "Client ID — The client which owns the order."
          - name: ordnum
            description: "Outbound Order Number — The order number the activity record is for."
          - name: trndtl_id
            description: "Transaction Detail ID — A link to antoher transaction Id for another table to show detailed information about the transaction."
          - name: trndtl_table
            description: "Transaction Detail Table — The table containing the detail information about the transaction."
          - name: adj_ref1
            description: "Adjustment Reference One — Reference number for sending information to the host."
          - name: adj_ref2
            description: "Adjustment Reference Two — Reference number for sending information to the host."
          - name: usr_id
            description: "User ID — The user the did the action that the activity is being captured for."
          - name: devcod
            description: "{{ doc('jdawms__devcod') }}"
          - name: arcdte
            description: "Archive Date — The archive date if this transaction was archived."
          - name: arc_src
            description: "Archive Source — The archival source of this table, if this table is created as an archiving table."
          - name: cmnt
            description: "Comments — Comment - Comment used for supervisor approval of adjustments."
          - name: asset_typ
            description: "Handling Unit Type — Asset Type : Asset type of the asset."
          - name: asset_id
            description: "Handling Unit ID — Asset ID : Unique identifier for the asset."
          - name: asset_stat
            description: "Handling Unit Status — Asset Status : Status of the asset."
          - name: load_attr1_flg
            description: "{{ doc('jdawms__load_attr1_flg') }}"
          - name: load_attr2_flg
            description: "{{ doc('jdawms__load_attr2_flg') }}"
          - name: load_attr3_flg
            description: "{{ doc('jdawms__load_attr3_flg') }}"
          - name: load_attr4_flg
            description: "{{ doc('jdawms__load_attr4_flg') }}"
          - name: load_attr5_flg
            description: "{{ doc('jdawms__load_attr5_flg') }}"
          - name: var_nam
            description: "Variable Name - Name of the attribute that was changed."
          - name: fr_value
            description: "From value - Original value of the attribute."
          - name: to_value
            description: "To value - Changed value of the attribute."
          - name: wh_id
            description: "Warehouse ID - the warehouse in which the building exists."
          - name: uomcod
            description: "Unit of measure used in the activity."
          - name: ftpcod
            description: "Footprint code used in the activity."
          - name: distro_excp_id
            description: "Distribution Exception ID — Unique Id to identify the distribution exception."
          - name: excp_code
            description: "Exception Code for this distribution exception."
          - name: expqty
            description: "Expected Quantity — The quantity expected to be distributed."
          - name: rptqty
            description: "Reported Quantity — The quantity actually distributed."
          - name: u_version
            description: "{{ doc('jdawms__u_version') }}"
          - name: ins_dt
            description: "{{ doc('jdawms__ins_dt') }}"
          - name: last_upd_dt
            description: "{{ doc('jdawms__last_upd_dt') }}"
          - name: ins_user_id
            description: "{{ doc('jdawms__ins_user_id') }}"
          - name: last_upd_user_id
            description: "{{ doc('jdawms__last_upd_user_id') }}"
          - name: to_trct_num
            description: "The final tractor number of the tractor affected by this transaction."
          - name: to_trlr_num
            description: "To Transport Equipment Number — The final trailer number of the trailer affected by this transaction."
          - name: to_carcod
            description: "To Carrier — The final carrier of the trailer affected by this transaction."
          - name: srvlvl
            description: "Service level of the record."
          - name: to_srvlvl
            description: "To Service Level — The final srvlvl of the shipment/carrier move affected by this transaction."
          - name: rowid
            description: "{{ doc('jdawms__rowid') }}"
          - name: _rescued_data
            description: "{{ doc('jdawms___rescued_data') }}"
          - name: loaddate
            description: "{{ doc('jdawms__loaddate') }}"
      - name: inv_snap
        description: "Inventory snapshot per part — point-in-time on-hand/shippable/ordered quantity rollup generated by a snapshot job."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 48, period: hour}
        columns:
          - name: inv_snap_id
            description: "Inventory Snapshot ID — Inventory Snap ID - PK value for this table."
          - name: prtnum
            description: "{{ doc('jdawms__prtnum__inv_snap') }}"
          - name: prt_client_id
            description: "{{ doc('jdawms__prt_client_id__inv_snap') }}"
          - name: gendte
            description: "Generation Date: Date and time the inventory snapshot was generated."
          - name: rcvqty
            description: "Receive Quantity — Received Quantity: Number of units received between the last time a snapshot was generated and the Generation Date."
          - name: shpqty
            description: "Shipped Quantity: Number of units shipped between the last time a snapshot was generated and the Generation Date."
          - name: adjqty
            description: "Adjusted Quantity — No of units adjusted between the last time a snapshot was generated and Generation Date. An adjustment includes adding, modifying or deleting inventory through invadjopr and cntaudopr, as well as inventory moved to WIP supply areas."
          - name: wko_cnsqty
            description: "Work Order Consumed Quantity: Number of units delivered to a work order processing location between the last time a snapshot was generated and the Generation Date."
          - name: wko_rcvqty
            description: "Work Order Received Quantity — Number of units received through a WO between the last time a snapshot was generated and Generation Date. This includes inventory received from a WO either through production of a top level item or the return to stock of components."
          - name: on_hand_qty
            description: "On-Hand Qty — The results here will be dictated by a policy. It will either be: the qty of this item number/item client id within four-wall locations or specified inventory status progression and is within four-wall locations."
          - name: shippable_qty
            description: "Shippable Qty — Shippable Quantity: A subset of the On-Hand Inventory Quantity that only includes on-hand inventory with an inventory status that is shippable."
          - name: ordered_qty
            description: "Ordered Qty — Ordered Quantity: The quantity of the item required for outstanding order lines."
          - name: planned_qty
            description: "Planned Quantity — Shipment Planned Quantity: The quantity of the item number/item client id that has already been assigned to a shipment that is not closed or cancelled."
          - name: wko_ordered_qty
            description: "Quantity field: wko_ordered_qty."
          - name: pnd_rcvqty
            description: "Pending Receipt Qty — The total qty of this item number/item client id that is expected, but has not yet been putaway and received into inventory. The results here will be dictated by a policy."
          - name: wh_id
            description: "{{ doc('jdawms__wh_id__inv_snap') }}"
          - name: snap_gen_num
            description: "Snapshot Generation Number — Maps to snap_gen_num on the Inventory Activity table. This indicates that all rows in the Inventory Activity table with a snap_gen_num that matches this value were included in the rcvqty and shpqty sum totals for this snapshot."
          - name: moddte
            description: "Date Last Modified — Last date this inventory snapshot was modified."
          - name: mod_usr_id
            description: "Modified by — Last user to modify this inventory snapshot."
          - name: u_version
            description: "{{ doc('jdawms__u_version') }}"
          - name: ins_dt
            description: "{{ doc('jdawms__ins_dt') }}"
          - name: last_upd_dt
            description: "{{ doc('jdawms__last_upd_dt') }}"
          - name: ins_user_id
            description: "{{ doc('jdawms__ins_user_id') }}"
          - name: last_upd_user_id
            description: "{{ doc('jdawms__last_upd_user_id') }}"
          - name: rowid
            description: "{{ doc('jdawms__rowid') }}"
          - name: _rescued_data
            description: "{{ doc('jdawms___rescued_data') }}"
          - name: loaddate
            description: "{{ doc('jdawms__loaddate') }}"
      - name: invdtl
        description: "Inventory detail — stock at the innermost unit (detail) level: quantity, status, dates, and its parent sub/load."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 168, period: hour}
        columns:
          - name: dtlnum
            description: "{{ doc('jdawms__dtlnum') }}"
          - name: subnum
            description: "Sub-LPN — Identifies which inventory sub (invsub) record this detail is attached to."
          - name: prtnum
            description: "Item number of the inventory tracked by this detail."
          - name: prt_client_id
            description: "Item Client ID — Client ownership for item number."
          - name: invsts
            description: "Inventory status of the inventory tracked by this detail."
          - name: fifdte
            description: "FIFO Date — The date to be used for FIFO calculations with this inventory."
          - name: expire_dte
            description: "Expiration Date — The date this product will expire. This is only used for date controlled product and is calculated based on the product's aging profile."
          - name: untqty
            description: "Unit Quantity — The amount of inventory (in stock keeping units) this detail tracks."
          - name: untcas
            description: "Units Per Case — The number of units in a case of the inventory tracked by this detail."
          - name: untpak
            description: "Units Per Pack — The number of units in an inner pack carton of the inventory tracked by this detail."
          - name: ftpcod
            description: "Footprint Code — The footprint code of the inventory tracked by this invdtl."
          - name: rcvkey
            description: "Receive Key — If this detail was received, then the receive key will be filled in indicating which rcvlin this detail was received against."
          - name: ship_line_id
            description: "Shipment Line ID — If this detail was picked for a shipment, then the ship_line_id field will be filled in mapping it to the particular shipment line which this detail satisfied."
          - name: wrkref
            description: "Work Task — If this detail was picked for a shipment or a work order, the wrkref field will be filled in which provides a mapping into the pckwrk_hdr/pckwrk_dtl tables for the pick which this detail satisfied."
          - name: wrkref_dtl
            description: "Work Task Detail — Pick Work Detail ID - The unique identifier of the pick work detail record."
          - name: adddte
            description: "Date Added — The date this detail was added to the system."
          - name: rcvdte
            description: "Received Date — This indicates the date and time that the detail was received."
          - name: lstmov
            description: "Last Move Date — Last date/time detail was moved."
          - name: lstdte
            description: "Last Activity Date/Time — Last date/time activity occurred for this detail."
          - name: lstcod
            description: "Last activity code on this detail."
          - name: lst_usr_id
            description: "Last user which performed an activity on this detail."
          - name: alcflg
            description: "Allow Allocation Flag. Is this detail allowed for use in allocation?"
          - name: catch_qty
            description: "Catch Quantity."
          - name: lst_mov_zone_id
            description: "Last Movement Zone ID. Displays the last movement zone id of the inventory. Moves to the RF device will NOT be updated with the rdt device as the last movement zone."
          - name: hld_flg
            description: "On Hold — This flag indicates that the inventory is put on hold if it has a value of 1 ."
          - name: loaddate
            description: "{{ doc('jdawms__loaddate') }}"
      - name: invlod
        description: "Inventory load (LPN/pallet) — the top-level license-plate unit stored in a location."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 168, period: hour}
        columns:
          - name: lodnum
            description: "{{ doc('jdawms__lodnum') }}"
          - name: wh_id
            description: "{{ doc('jdawms__wh_id') }}"
          - name: stoloc
            description: "Location — Indicates the storage location for this pallet."
          - name: lodwgt
            description: "Load Weight — In systems where scales are available, this field may be used to store the physical weight of the pallet that this entry represents."
          - name: prmflg
            description: "{{ doc('jdawms__prmflg') }}"
          - name: unkflg
            description: "Unknown — This will be set to 1 if this invsub record represents a physical case in the system. In this case, the subnum will be set to the external labeling on the physical case."
          - name: mvlflg
            description: "Movable Load — This is used to indicate if this subload entry may be moved. In the case where permanent subloads are used to provide places to attach inventory, it is seldom desired that those permanent subs be allowed to move."
          - name: adddte
            description: "Date Added — The date/time this load was added to the system."
          - name: lstmov
            description: "Last Move Date — The last date/time this load was moved."
          - name: lstdte
            description: "Last Activity Date/Time — The last date/time an activity happened against this load."
          - name: lstcod
            description: "Last activity code on this load."
          - name: lst_usr_id
            description: "Last user which performed an activity on this load."
          - name: loducc
            description: "LPN UCC — If UCC128 processing is installed and this load receives a UCC128 shipping label, then this field will be filled in with the value of that label."
          - name: uccdte
            description: "{{ doc('jdawms__uccdte') }}"
          - name: palpos
            description: "Pallet Position — Indicates what position the load's pallet occupies."
          - name: asset_typ
            description: "Handling Unit Type — Asset Type - Identifies the asset type for this load."
          - name: avg_unt_catch_qty
            description: "Average Unit Catch Quantity — Catch Quantity. Used by the Average Catch Quantity functionality to store an average catch value for a load's units."
          - name: u_version
            description: "{{ doc('jdawms__u_version') }}"
          - name: ins_dt
            description: "{{ doc('jdawms__ins_dt') }}"
          - name: last_upd_dt
            description: "{{ doc('jdawms__last_upd_dt') }}"
          - name: ins_user_id
            description: "{{ doc('jdawms__ins_user_id') }}"
          - name: last_upd_user_id
            description: "{{ doc('jdawms__last_upd_user_id') }}"
          - name: lodtag
            description: "Load Tag — The RFID tag associated to pallet."
          - name: lod_tagsts
            description: "Load Tag Status — Pallet RFID Tag Status."
          - name: lodhgt
            description: "Load Height — The Load Height."
          - name: bundled_flg
            description: "Bundled Flag - Indicate if the load was created by bundling multiple cases for parcel manifesting."
          - name: distro_palopn_flg
            description: "Distribution Pallet Open Flag - Indicate whether the shipping pallet is open or not."
          - name: load_attr1_flg
            description: "{{ doc('jdawms__load_attr1_flg') }}"
          - name: load_attr2_flg
            description: "{{ doc('jdawms__load_attr2_flg') }}"
          - name: load_attr3_flg
            description: "{{ doc('jdawms__load_attr3_flg') }}"
          - name: load_attr4_flg
            description: "{{ doc('jdawms__load_attr4_flg') }}"
          - name: load_attr5_flg
            description: "{{ doc('jdawms__load_attr5_flg') }}"
          - name: no_loc_putaway
            description: "No Location Putaway Flag — This column is a flag that denotes if this pallet failed to find a location when doing putaway."
          - name: completed_receiving_date
            description: "Receipt Confirmation Date — Date the receiving of this load was completed."
          - name: est_time
            description: "{{ doc('jdawms__est_time') }}"
          - name: lodlen
            description: "Load Length — The Load length."
          - name: lodwdt
            description: "Load Width — The Load width."
          - name: no_of_boxes
            description: "Number of Cases — No of cases on the load."
          - name: est_lodwgt
            description: "Estimated Load Weight — This field is used to store the system estimated weight of the pallet that this entry represents."
          - name: loaddate
            description: "{{ doc('jdawms__loaddate') }}"
      - name: invsub
        description: "Inventory sub (carton/case) — the intermediate unit nested inside a load and containing details."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 168, period: hour}
        columns:
          - name: subnum
            description: "{{ doc('jdawms__subnum') }}"
          - name: lodnum
            description: "LPN — Identifies which inventory load (invlod) record this subload is attached to."
          - name: subwgt
            description: "Sub-Load Weight — In systems where scales are available, this field may be used to store the physical weight of the case that this invsub entry represents."
          - name: prmflg
            description: "{{ doc('jdawms__prmflg') }}"
          - name: phyflg
            description: "Physical Case — This will be set to 1 if this invsub record represents a physical case in the system. In this case, the subnum will be set to the external labeling on the physical case."
          - name: mvsflg
            description: "Movable Sub-Load — This is used to indicate if this subload entry may be moved. In the case where permanent subloads are used to provide places to attach inventory, it is seldom desired that those permanent subs be allowed to move."
          - name: ctnflg
            description: "Cartonized — This will be set if this sub was created as a result of a cartonization or overpack operation."
          - name: idmflg
            description: "Inhibit Detail Move — This flag will be set if details are not allowed to move out from under this subload. When serialized product is tracked in a facility, it is sometimes desired to disable details from moving out of a serialized, physical case."
          - name: distro_ctnopn_flg
            description: "Put To Store Carton Open — The flag to show whether the put to store Carton is open or not."
          - name: wrkref
            description: "Work Task — If this subload represents a cartonized or overpacked case, and the case was picked against a work reference, the wrkref field will map back to the pckwrk_hdr/pckwrk_dtl tables to indicate which KIT pick this subload was picked against."
          - name: tagdev
            description: "Tagged Device — Used so that RF can tag cases for later operations."
          - name: adddte
            description: "Date Added — Set to the date and time this invsub entry was added to the system."
          - name: lstmov
            description: "Last Move Date — The last date/time this subload was moved."
          - name: lstdte
            description: "Last Activity Date/Time — Last date/time activity occurred on this subload."
          - name: lstcod
            description: "Last activity code on this subload."
          - name: lst_usr_id
            description: "Last user which performed an activity on this subload."
          - name: subucc
            description: "Sub-Load UCC Code — If UCC128 processing is installed and this case receives a UCC128 shipping label, then this field will be filled in with the value of that label."
          - name: uccdte
            description: "{{ doc('jdawms__uccdte') }}"
          - name: subtag
            description: "Case Tag — The RFID tag associated to carton."
          - name: sub_tagsts
            description: "Case Tag Status — Carton RFID Tag Status."
          - name: asset_typ
