version: 2

sources:
  - name: jdawms
    description: >
      JDA / Blue Yonder WMS (jdawmsrep) replication feed, landed into Unity Catalog
      catalog ust_databricks, schema jdawmsrep, via Azure Blob ingestion. All tables
      are READ-ONLY. `loaddate` is the ingestion watermark. Databricks-only source:
      there is no local DuckDB sample, so jdawms staging is gated to the databricks target.
    database: ust_databricks
    schema: jdawmsrep
    config:
      tags: ["raw", "jdawms", "wms"]
      meta:
        access: read_only
        source_system: jdawms
        doc_status: ai_generated   # column descriptions AI-inferred; pending SME verification
    tables:
      - name: dlytrn
        description: "Daily inventory transaction log — one row per stock movement/adjustment (receipt, pick, putaway, transfer). The WMS activity ledger."
        config:
          loaded_at_field: loaddate
          freshness:
            warn_after: {count: 48, period: hour}
        columns:
          - name: dlytrn_id
            description: "Primary key — unique id of the daily transaction."
          - name: trndte
            description: "Transaction date/time."
          - name: oprcod
            description: "Operation code — high-level operation (receive, pick, adjust, move)."
          - name: actcod
            description: "Activity code — specific activity within the operation."
          - name: lodnum
            description: "License-plate / load (LPN) number."
          - name: subnum
            description: "Sub (carton/case) number nested within a load."
          - name: dtlnum
            description: "Inventory detail number (innermost unit)."
          - name: to_lodnum
            description: "Code/identifier: to_lodnum."
          - name: to_subnum
            description: "Code/identifier: to_subnum."
          - name: to_dtlnum
            description: "Code/identifier: to_dtlnum."
          - name: prtnum
            description: "Part (item) number — the SKU identifier."
          - name: prt_client_id
            description: "Client/owner id for the part (multi-client warehouse partitioning)."
          - name: orgcod
            description: "Country/origin code of the goods."
          - name: revlvl
            description: "Revision level of the part."
          - name: lotnum
            description: "Lot/batch number."
          - name: sup_lotnum
