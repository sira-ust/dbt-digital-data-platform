version: 2

models:
  - name: int_events_enriched
    description: >
      System event log events joined to the event dictionary (seed_event_codes)
      and app-source registry (seed_app_sources). Event grain — one row per
      system_event_log record. Foundation for system-event analytics.
    columns:
      - name: entity_id
        tests: [not_null, unique]

  - name: int_customer_tracking_enriched
    description: >
      Customer app events (tracking_report_event) enriched with their parent
      session context (tracking_report). Event grain — one row per event.
      Covers only customers who opted in to tracking, sourced from mobile app
      only. Foundation for customer engagement and product interaction analytics.
    columns:
      - name: entity_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: session_entity_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mysql__tracking_report')
                field: entity_id
              config:
                severity: warn

  - name: int_user_activity_enriched
    description: >
      Sales rep activity events (user_activity_report_event) enriched with
      session context (user_activity_report) and user master data (admin_users).
      Event grain — one row per event. admin_users join is left — returns null
      for name/role columns until MySQL access is available, then enriches
      automatically. Foundation for sales rep performance and activity analytics.
    columns:
      - name: entity_id
        tests: [not_null, unique]
      - name: username
        tests: [not_null]
      - name: session_entity_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mysql__user_activity_report')
                field: entity_id
              config:
                severity: warn
