version: 2

models:
  - name: int_events_decoded
    description: >
      Decode/parse spine for the system event log. Reads lossless staging and
      applies everything that is not a 1:1 source map: analytics renames, the
      8-digit description_code split into L1-L4, success/failure flags,
      event_time→UTC (per-row device offset) and created_at/updated_at→UTC
      (constant +8h from PST), location→lat/lon, and source decode into
      actor_type + a unified customer_key. Event grain — one row per record.
      int_events_enriched and all downstream facts/marts read from here.
    columns:
      - name: entity_id
        description: Primary key. One row per system event.
        tests: [not_null, unique]
      - name: sales_code
        description: Sales team / territory code; null when absent.
      - name: username
        description: Salesperson login on sales apps; customer account number on customer apps.
      - name: ust_customer_no
        description: Customer the salesperson is acting for; null on customer apps or when none selected.
      - name: device_name
        description: Device alias-model string.
      - name: source_code
        description: App source code the event came from.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [PDA-A, CatalogFC-A, CatalogFC-I, CatalogFS-I, CatalogFS-A, Vegas-I, Vegas-A, CatalogSE, Web]
      - name: app_version
        description: App version string.
      - name: description_code
        description: 8-digit hierarchical event code. Join key to seed_event_codes.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('seed_event_codes')
                field: description_code
              config:
                severity: warn
      - name: l1_code
        description: Level-1 segment of description_code. Top category.
      - name: l2_code
        description: Level-2 segment of description_code.
      - name: l3_code
        description: Level-3 segment of description_code.
      - name: l4_code
        description: >
          Level-4 (deepest) segment of description_code. Not interpreted here:
          success/failure is NOT derived because the outcome marker sits at
          different segments by family — apply outcome logic downstream JIT.
      - name: event_at_utc
        description: Device event time converted to UTC using the row timezone offset.
      - name: device_timezone
        description: Device UTC offset string.
      - name: created_at_utc
        description: Server created_at converted to UTC. Authoritative for ordering.
        tests: [not_null]
      - name: updated_at_utc
        description: Server updated_at converted to UTC. Latest wins on dedup.
      - name: event_id_at_utc
        description: Device-side epoch-millis event_id parsed to a UTC timestamp.
      - name: latitude
        description: Latitude parsed from the location string.
      - name: longitude
        description: Longitude parsed from the location string.
      - name: actor_type
        description: Sales for sales-app sources, otherwise customer.
        tests:
          - accepted_values:
              arguments:
                values: [sales, customer]
      - name: customer_key
        description: Unified customer key. ust_customer_no on sales apps, username on customer apps.
      - name: response
        description: Event payload string. Not JSON; format varies by event family.

  - name: int_events_enriched
    description: >
      Decoded events (int_events_decoded) joined to the event dictionary
      (seed_event_codes) and app-source registry (seed_app_sources), plus
      dictionary-driven classification: outcome (success/fail parsed from the
      dev team's "- Success/- Fail" function names), canonical feature_name /
      feature_group / page_context, and cart-edit flags. Classification applies
      only to dictionary-mapped codes; unmapped codes (legacy, junk) get nulls
      and are surfaced in dq_unmapped_event_codes. Event grain — one row per
      system_event_log record. Foundation for system-event analytics.
    columns:
      - name: entity_id
        tests: [not_null, unique]
      - name: outcome
        description: >
          success / fail parsed from the dictionary function name (the code
          segment that marks outcome differs by family, so the name is the
          authoritative marker). Null when the code has no outcome concept or
          is unmapped.
        tests:
          - accepted_values:
              arguments:
                values: [success, fail]
      - name: feature_name
        description: >
          Canonical product feature (action type). search=L1 12, filter=11,
          catalog_view=19, item_detail=14, image_enlarge=15, icon_click=L1 18
          icon taps, oos_check=name-based (families 10+18). Null for
          non-feature events.
        tests:
          - accepted_values:
              arguments:
                values: [search, filter, icon_click, catalog_view, item_detail, image_enlarge, oos_check]
      - name: feature_group
        description: "Feature rollup: discovery / navigation / cart / stock."
      - name: page_context
        description: >
          Catalog section the action happened in, parsed from the function
          name: promo / backorder / history / suggest. Independent of
          feature_name (e.g. add_item_promo_page = cart add in promo section).
        tests:
          - accepted_values:
              arguments:
                values: [promo, backorder, history, suggest]
      - name: is_add
        description: Cart add event (codes 1005xxxx, dictionary-mapped only).
      - name: is_remove
        description: Cart remove event (codes 1004xxxx, dictionary-mapped only).
      - name: is_qty_change
        description: Cart quantity-change event (codes 1015xxxx, dictionary-mapped only).
