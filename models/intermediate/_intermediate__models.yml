version: 2

models:
  - name: int_customer_sessions
    description: >
      Event-grain join of stg_mysql__tracking_report (session header) and
      stg_mysql__tracking_report_event (page/action events). One row per
      session x event; sessions with no events still appear (left join).
      Used by mart_customer_app_session and mart_page_dwell.
    columns:
      - name: session_id
        description: FK to stg_mysql__tracking_report.entity_id.
        tests: [not_null]
      - name: customer_id
        description: Customer identifier.
      - name: event_id
        description: FK to stg_mysql__tracking_report_event.entity_id. Null for sessions with no events.

  - name: int_rep_activity_events
    description: >
      Event-grain join of stg_mysql__user_activity_report_event (activity
      events) and stg_mysql__user_activity_report (session header), plus a lookup
      to stg_mysql__admin_users for the rep territory. One row per rep activity
      event enriched with device_model, app_version (both from the session header)
      and activity_date. sales_code is resolved from admin_users.salesperson_code
      via the login account (the event table no longer carries it) — NULL on the
      duckdb target where admin_users is empty. Used by mart_rep_customer_visits
      and mart_rep_daily_activity.
    columns:
      - name: entity_id
        description: Primary key from stg_mysql__user_activity_report_event.
        tests: [not_null, unique]
      - name: session_id
        description: FK to stg_mysql__user_activity_report.entity_id.
      - name: username
        description: Sales rep login account.
      - name: activity_date
        description: Calendar date derived from begin_time.

  - name: int_events_decoded
    description: >
      Decode/parse spine for the system event log. Reads lossless staging and
      applies everything that is not a 1:1 source map: analytics renames, the
      8-digit description_code split into L1-L4, success/failure flags,
      event_time→UTC (per-row device offset) and created_at/updated_at→UTC
      (constant +8h from PST), location→lat/lon, and source decode into
      actor_type + a unified customer_key. Event grain — one row per record.
      int_events_enriched and all downstream facts/marts read from here.
    columns:
      - name: entity_id
        description: Primary key. One row per system event.
        tests: [not_null, unique]
      - name: sales_code
        description: Sales team / territory code; null when absent.
      - name: username
        description: Salesperson login on sales apps; customer account number on customer apps.
      - name: ust_customer_no
        description: Customer the salesperson is acting for; null on customer apps or when none selected.
      - name: device_name
        description: Device alias-model string.
      - name: source_code
        description: App source code the event came from.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [PDA-A, CatalogFC-A, CatalogFC-I, CatalogFS-I, CatalogFS-A, Vegas-I, Vegas-A, CatalogSE, Web]
      - name: app_version
        description: App version string.
      - name: description_code
        description: 8-digit hierarchical event code. Join key to seed_event_codes.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('seed_event_codes')
                field: description_code
              config:
                severity: warn
      - name: l1_code
        description: Level-1 segment of description_code. Top category.
      - name: l2_code
        description: Level-2 segment of description_code.
      - name: l3_code
        description: Level-3 segment of description_code.
      - name: l4_code
        description: Level-4 segment of description_code. Outcome.
      - name: is_success
        description: True when the L4 outcome segment is success (01).
      - name: is_failure
        description: True when the L4 outcome segment is failure (02).
      - name: event_at_utc
        description: Device event time converted to UTC using the row timezone offset.
      - name: device_timezone
        description: Device UTC offset string.
      - name: created_at_utc
        description: Server created_at converted to UTC. Authoritative for ordering.
        tests: [not_null]
      - name: updated_at_utc
        description: Server updated_at converted to UTC. Latest wins on dedup.
      - name: event_id_at_utc
        description: Device-side epoch-millis event_id parsed to a UTC timestamp.
      - name: latitude
        description: Latitude parsed from the location string.
      - name: longitude
        description: Longitude parsed from the location string.
      - name: actor_type
        description: Sales for sales-app sources, otherwise customer.
        tests:
          - accepted_values:
              arguments:
                values: [sales, customer]
      - name: customer_key
        description: Unified customer key. ust_customer_no on sales apps, username on customer apps.
      - name: response
        description: Event payload string. Not JSON; format varies by event family.

  - name: int_events_enriched
    description: >
      Decoded events (int_events_decoded) joined to the event dictionary
      (seed_event_codes) and app-source registry (seed_app_sources). Event
      grain — one row per system_event_log record. Foundation for system-event
      analytics.
    columns:
      - name: entity_id
        tests: [not_null, unique]

  - name: int_feature_funnel
    description: >
      Behaviour-level discovery funnel — links a home-page feature icon click
      (Group 18) to an add from that feature's page (Group 10.5), per customer
      per feature (Recommend / Promo / New / Backorder). No session container
      exists, so this is a behaviour-level funnel (clicked feature X then added
      from page X), not a strict within-session sequence.
      Grain: customer_key x feature.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [customer_key, feature]
    columns:
      - name: customer_key
        description: Unified customer key the funnel activity belongs to.
        tests: [not_null]
      - name: feature
        description: Discovery feature — Recommend, Promo, New, or Backorder.
        tests: [not_null]
      - name: click_events
        description: Count of feature icon-click events for this customer.
      - name: add_events
        description: Count of add-from-feature-page events for this customer.

  - name: int_catalog_dwell
    description: >
      Catalog View analytics (19010000) parsed to one row per view event, with
      the kv payload (category, visits_num, time) decoded and the category id
      resolved via seed_categories. The only event family recording actual
      time-on-page. Grain: one row per catalog-view event.
    columns:
      - name: entity_id
        description: Primary key from the source event.
        tests: [not_null, unique]
      - name: category_id
        description: Category id parsed from the kv payload.
      - name: category_name
        description: Category name resolved from seed_categories; null if unmapped.
      - name: pages_viewed
        description: visits_num from the payload — pages viewed in the category.
      - name: dwell_seconds
        description: time from the payload — seconds spent in the category.

  - name: int_order_cycle
    description: >
      Keystone order grain — one row per increment_id x customer, reconstructed
      exactly from order events that carry increment_id: open = Create Order
      (09010000), close = any Group 04 submit success. days_to_close =
      submitted_at - opened_at; a cycle with an open and no submit is pending.
      Per-cycle cart-edit counts are NOT here (add/remove events carry no
      increment_id — deferred). Empty until the extract contains Group 04/09.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [increment_id, customer_key]
    columns:
      - name: increment_id
        description: Order increment id parsed from the order-event payload.
        tests: [not_null]
      - name: customer_key
        description: Unified customer key the cycle belongs to.
      - name: opened_at
        description: Cycle open time (UTC) from the Create Order event.
      - name: submitted_at
        description: Cycle close time (UTC) from the first successful submit.
      - name: is_submitted
        description: True when the cycle has a successful submit.
      - name: days_to_close
        description: Days from opened_at to submitted_at; null if not submitted or no open.
