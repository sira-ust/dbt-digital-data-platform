version: 2

models:
  - name: int_events_decoded
    description: >
      Decode/parse spine for the system event log. Reads lossless staging and
      applies everything that is not a 1:1 source map: analytics renames, the
      8-digit description_code split into L1-L4, success/failure flags,
      event_time→UTC (per-row device offset) and created_at/updated_at→UTC
      (constant +8h from PST), location→lat/lon, and source decode into
      actor_type + a unified customer_key. Event grain — one row per record.
      int_events_enriched and all downstream facts/marts read from here.
    columns:
      - name: entity_id
        description: Primary key. One row per system event.
        tests: [not_null, unique]
      - name: sales_code
        description: Sales team / territory code; null when absent.
      - name: username
        description: Salesperson login on sales apps; customer account number on customer apps.
      - name: ust_customer_no
        description: Customer the salesperson is acting for; null on customer apps or when none selected.
      - name: device_name
        description: Device alias-model string.
      - name: source_code
        description: App source code the event came from.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [PDA-A, CatalogFC-A, CatalogFC-I, CatalogFS-I, CatalogFS-A, Vegas-I, Vegas-A, CatalogSE, Web, CatalogFC, Vegas]
      - name: app_version
        description: App version string.
      - name: description_code
        description: 8-digit hierarchical event code. Join key to seed_event_codes.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('seed_event_codes')
                field: description_code
              config:
                severity: warn
      - name: l1_code
        description: Level-1 segment of description_code. Top category.
      - name: l2_code
        description: Level-2 segment of description_code.
      - name: l3_code
        description: Level-3 segment of description_code.
      - name: l4_code
        description: >
          Level-4 (deepest) segment of description_code. Not interpreted here:
          success/failure is NOT derived because the outcome marker sits at
          different segments by family — apply outcome logic downstream JIT.
      - name: event_at_utc
        description: Device event time converted to UTC using the row timezone offset.
      - name: device_timezone
        description: Device UTC offset string.
      - name: created_at_utc
        description: Server created_at converted to UTC. Authoritative for ordering.
        tests: [not_null]
      - name: updated_at_utc
        description: Server updated_at converted to UTC. Latest wins on dedup.
      - name: event_id_at_utc
        description: Device-side epoch-millis event_id parsed to a UTC timestamp.
      - name: latitude
        description: Latitude parsed from the location string.
      - name: longitude
        description: Longitude parsed from the location string.
      - name: actor_type
        description: Sales for sales-app sources, otherwise customer.
        tests:
          - accepted_values:
              arguments:
                values: [sales, customer]
      - name: customer_key
        description: Unified customer key. ust_customer_no on sales apps, username on customer apps.
      - name: response
        description: Event payload string. Not JSON; format varies by event family.

  - name: int_events_enriched
    description: >
      Decoded events (int_events_decoded) joined to the event dictionary
      (seed_event_codes) and app-source registry (seed_app_sources), plus
      dictionary-driven classification: outcome (success/fail parsed from the
      dev team's "- Success/- Fail" function names), canonical feature_name /
      feature_group / page_context, and cart-edit flags. Classification applies
      only to dictionary-mapped codes; unmapped codes (legacy, junk) get nulls
      and are surfaced in dq_unmapped_event_codes. Event grain — one row per
      system_event_log record. Foundation for system-event analytics.
    columns:
      - name: entity_id
        tests: [not_null, unique]
      - name: outcome
        description: >
          success / fail parsed from the dictionary function name (the code
          segment that marks outcome differs by family, so the name is the
          authoritative marker). Null when the code has no outcome concept or
          is unmapped.
        tests:
          - accepted_values:
              arguments:
                values: [success, fail]
      - name: feature_name
        description: >
          Canonical product feature (action type). search=L1 12, filter=11,
          catalog_view=19, item_detail=14, image_enlarge=15, icon_click=L1 18
          icon taps, oos_check=name-based (families 10+18). Null for
          non-feature events.
        tests:
          - accepted_values:
              arguments:
                values: [search, filter, icon_click, catalog_view, item_detail, image_enlarge, oos_check]
      - name: feature_group
        description: "Feature rollup: discovery / navigation / cart / stock."
      - name: page_context
        description: >
          Catalog section the action happened in, parsed from the function
          name: promo / backorder / history / suggest. Independent of
          feature_name (e.g. add_item_promo_page = cart add in promo section).
        tests:
          - accepted_values:
              arguments:
                values: [promo, backorder, history, suggest]
      - name: is_add
        description: Cart add event (codes 1005xxxx, dictionary-mapped only).
      - name: is_remove
        description: Cart remove event (codes 1004xxxx, dictionary-mapped only).
      - name: is_qty_change
        description: Cart quantity-change event (codes 1015xxxx, dictionary-mapped only).

  - name: int_item_demand_daily
    description: >
      App-side item demand, one row per sku x day x source_system. The single
      owner of SKU extraction from event payloads (positional cart payloads
      "sku,qty[,category]" and bare-sku item-detail/enlarge payloads); only
      skus shaped like a WMS item number (3-8 digits) are kept. sku values
      equal jdawms prtnum (verified 2026-07-13, 99.9% on clean columns).
      Materialized as a view over int_events_enriched — thin projection read
      once per mart build. source_system is 'event_log' today; the legacy
      tracking tables (history to 2023-09) union in here if pre-2026 history
      is ever needed. Demand history starts 2026-01-22 (event log go-live).
    config:
      tags: ["demand"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [sku, activity_date, source_system]
    columns:
      - name: activity_date
        description: UTC calendar day of the events.
        tests: [not_null]
      - name: sku
        description: Item number extracted from the payload. Equals jdawms prtnum.
        tests: [not_null]
      - name: source_system
        description: Which log stream produced the row (event_log for now).
      - name: item_detail_views
        description: Item Detail opens (feature_name item_detail).
      - name: image_enlarge_views
        description: Item image enlarges (feature_name image_enlarge).
      - name: cart_adds
        description: Cart add events for the sku.
      - name: cart_removes
        description: Cart remove events for the sku.
      - name: cart_qty_changes
        description: Cart quantity-change events for the sku.
      - name: cart_add_qty
        description: Units added to cart (positional payload part 2; 0 when unparseable).
      - name: distinct_customers
        description: Distinct customer_key values interacting with the sku that day.
      - name: distinct_self_customers
        description: Distinct customers acting for themselves (actor_type customer).

  - name: int_jdawms_inventory_daily
    description: >
      WMS stock position, one row per item x warehouse x snapshot day —
      inv_snap deduped to the last snapshot per day with a proper
      snapshot_date. Day grain on purpose; weekly rollups belong to marts.
      CABOT warehouse only (the replica mirrors a single wh_id). Snapshots
      generate ~23:00 UTC, verified daily (51/60 days). ordered_qty,
      planned_qty and pnd_rcvqty keep their WMS names — in/outbound
      semantics not yet dev-confirmed. Materialized as a view.
    config:
      tags: ["jdawms", "wms"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [prtnum, prt_client_id, wh_id, snapshot_date]
    columns:
      - name: prtnum
        description: WMS item number. Equals the app-side sku.
        tests: [not_null]
      - name: prt_client_id
        description: Item owner (3PL client) — part of the WMS composite item key.
      - name: wh_id
        description: Warehouse (CABOT only in the current replica).
      - name: snapshot_date
        description: Calendar day the snapshot was generated.
        tests: [not_null]
      - name: snapshot_at
        description: Exact snapshot generation timestamp (gendte).
      - name: shippable_qty
        description: Units shippable that day — the availability measure.
      - name: on_hand_qty
        description: Units physically on hand.
      - name: ordered_qty
        description: WMS ordered quantity (verbatim; exact semantics unconfirmed).
      - name: planned_qty
        description: WMS planned quantity (verbatim; exact semantics unconfirmed).
      - name: pnd_rcvqty
        description: Pending-receipt quantity (verbatim; exact semantics unconfirmed).

  - name: int_jdawms_items
    description: >
      The WMS item master made readable — one row per item (prtnum +
      prt_client_id): prtmst attributes, English names from prtdsc, decoded
      ABC class from seed_jdawms_code_descriptions (the seed's first
      consumer). CABOT template rows override the '----' default, same
      convention as the seed. Generic item spine for SKU-level marts and
      the future dim_items surface for Unity Catalog / Genie. Materialized
      as a view (~5.7k rows).
    config:
      tags: ["jdawms", "wms"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [prtnum, prt_client_id]
    columns:
      - name: prtnum
        description: WMS item number. Equals the app-side sku (verified 99.9%).
        tests: [not_null]
      - name: prt_client_id
        description: Item owner (3PL client) — part of the WMS composite item key.
      - name: dsp_prtnum
        description: Display item number (equals prtnum in practice).
      - name: item_name
        description: US_ENGLISH long description from prtdsc.
      - name: item_short_name
        description: US_ENGLISH short description from prtdsc.
      - name: item_family
        description: WMS product family (prtfam).
      - name: abc_class
        description: ABC velocity class code (abccod).
      - name: abc_class_description
        description: Decoded ABC class from seed_jdawms_code_descriptions.
      - name: velocity_zone
        description: WMS velocity zone (velzon; no decode domain available yet).
      - name: stock_uom
        description: Stock-keeping unit of measure.
      - name: display_uom
        description: Display unit of measure.
      - name: receive_status
        description: Default receive inventory status (rcvsts; decode still open in the seed gaps).
