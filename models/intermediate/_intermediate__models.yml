version: 2

models:
  - name: int_events_enriched
    description: All events joined to the event dictionary and app-source registry
    columns:
      - name: entity_id
        tests: [not_null, unique]

  - name: int_logins
    description: Login events (0203xx)
    columns:
      - name: entity_id
        tests: [not_null, unique]

  - name: int_downloads
    description: Download/sync events (03xx) with Time:s duration extracted on successes
    columns:
      - name: entity_id
        tests: [not_null, unique]

  - name: int_catalog_views
    description: Catalog View (19010000) kv payload parsed; joined to seed_categories
    columns:
      - name: entity_id
        tests: [not_null, unique]

  - name: int_item_interactions
    description: Item interactions (10/14/15/18 families) — sku, page context, titles, scans
    columns:
      - name: entity_id
        tests: [not_null, unique]
