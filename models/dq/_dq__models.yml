version: 2

models:
  - name: audit_event_record_errors
    description: >
      Row-level DQ table — one row per (event record, rule violation).
      Rules are driven by seed reference data: unknown_event_code,
      unknown_source_code, unexpected_payload, missing_payload,
      missing_event_time, unknown_category.
    columns:
      - name: entity_id
        tests:
          - not_null
      - name: error_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - unknown_event_code
                  - unknown_source_code
                  - unexpected_payload
                  - missing_payload
                  - missing_event_time
                  - unknown_category
      - name: severity
        tests:
          - accepted_values:
              arguments:
                values: [error, warn]

  - name: audit_error_summary
    description: Triage rollup of audit_event_record_errors by error_type and code.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - error_type
              - severity
              - description_code
    columns:
      - name: error_type
        tests:
          - not_null
