version: 2

models:
  - name: mart_page_dwell
    description: >
      Customer app page analytics at page-name grain (one row per page).
      Sourced from stg_mysql__tracking_report_event. Search:* pages are
      normalised to "Search Results". is_category_page flags product category
      pages (e.g. Rice & Noodles, Beverages) vs nav/search pages.
    columns:
      - name: page_name
        description: Page name; Search:* variants collapsed to "Search Results".
        tests: [unique, not_null]
      - name: is_search_page
        description: True when the original page was a search-results page (Search:*).
      - name: is_category_page
        description: True for product category pages; false for nav and search pages.
      - name: visit_count
        description: Total page view events.
      - name: distinct_customers
        description: Unique customer_id values that visited this page.
      - name: total_dwell_seconds
        description: Sum of duration_seconds across all visits.
      - name: avg_dwell_seconds
        description: Average seconds per visit (rounded to 1 dp).

  - name: mart_customer_app_session
    description: >
      Customer app sessions at session grain (one row per tracking_report
      entity_id). Sourced from int_customer_sessions. Aggregates page views,
      dwell time, cart actions, search events, and SKU interactions per session.
    columns:
      - name: session_id
        description: Primary key — tracking_report entity_id.
        tests: [unique, not_null]
      - name: customer_id
        description: Customer identifier.
      - name: session_minutes
        description: Session duration in minutes (session_end - session_start).
      - name: page_views
        description: Non-null page events within the session.
      - name: distinct_pages
        description: Unique pages visited.
      - name: add_events
        description: Cart add actions (event_type contains 'add').
      - name: remove_events
        description: Cart remove or delete actions.
      - name: submit_events
        description: submit_quote_cart_page events — order placement attempts.
      - name: placed_order
        description: True if at least one submit_quote_cart_page event occurred.

  - name: mart_rep_customer_visits
    description: >
      Sales rep x customer grain (one row per rep-customer pair). Sourced from
      int_rep_activity_events, filtered to events where customer is populated
      and differs from username. Shows visit frequency, SKU coverage, and GPS
      availability per rep-customer relationship.
    columns:
      - name: username
        description: Sales rep login account.
        tests: [not_null]
      - name: customer
        description: Customer being visited.
        tests: [not_null]
      - name: visit_days
        description: Distinct calendar days the rep visited this customer.
      - name: relationship_days
        description: Days between first and last visit.
      - name: unique_skus_shown
        description: Distinct SKUs presented or ordered during visits.
      - name: has_gps
        description: True if any visit event had GPS coordinates.

  - name: mart_rep_daily_activity
    description: >
      Sales rep x day grain (one row per rep per calendar day). Sourced from
      int_rep_activity_events. Aggregates sessions, customer visits, SKU
      events, GPS pings, and device battery metrics per rep per day.
    columns:
      - name: username
        description: Sales rep login account.
        tests: [not_null]
      - name: activity_date
        description: Calendar date.
        tests: [not_null]
      - name: sessions
        description: Distinct session IDs active on this day.
      - name: total_events
        description: All activity events on this day.
      - name: customers_visited
        description: Distinct customers the rep interacted with (excludes self-reference).
      - name: unique_skus
        description: Distinct SKUs referenced in activity events.
      - name: gps_pings
        description: Events that had a non-null location.
      - name: active_minutes
        description: Minutes between first and last event of the day.
      - name: min_battery
        description: Lowest battery reading recorded (bigint percentage).
      - name: avg_battery
        description: Average battery level across events with a battery reading.
