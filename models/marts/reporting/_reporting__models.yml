version: 2

models:
  - name: mart_rep_weekly
    description: >
      Rep workload + feature usage, one row per sales_code x week. Order
      counts/value are EXACT (fct_orders); per-cycle metrics are APPROXIMATE
      (time-heuristic cycles from fct_order_cycles) — label as approximate in
      BI. Full outer join of the two sides: a week can have orders with no
      reconstructed cycles and vice versa. Answers "who's doing more or less
      work, and is team activity growing or shrinking".
    columns:
      - name: sales_code
        description: Rep territory code.
        tests: [not_null]
      - name: rep_name
        description: Display name from admin_users (max per territory code).
      - name: week_start
        description: Monday of the ISO week.
        tests: [not_null]
      - name: orders_submitted
        description: Submitted orders that week (exact, from fct_orders).
      - name: order_value_total
        description: Sum of grand_total that week (exact, from fct_orders).
      - name: cycles_worked
        description: Cycles the rep touched that week (approximate).
      - name: cycles_submitted
        description: Of those, cycles that ended in a submit.
      - name: avg_days_to_close
        description: Average calendar days from first cycle event to submit (approximate).

  - name: mart_customer_weekly
    description: >
      Customer behaviour, one row per customer_key x week. Event-based metrics
      (features, cart edits, friction) come straight from int_events_enriched
      so browsing outside any cycle still counts; cycle counts from
      fct_order_cycles; order counts from fct_orders (exact). Includes
      service_mode (self_service >= 80% self events / sales_assisted <= 20% /
      mixed), friction-family counts (request review, sales review, restore,
      delete, OOS checks) and churn_signal (removes > adds for
      churn_consecutive_weeks observed weeks running).
    columns:
      - name: customer_key
        description: Unified customer key.
        tests: [not_null]
      - name: week_start
        description: Monday of the ISO week.
        tests: [not_null]
      - name: service_mode
        description: self_service / sales_assisted / mixed, by share of self events.
        tests:
          - accepted_values:
              arguments:
                values: [self_service, sales_assisted, mixed]
      - name: net_item_events
        description: add_count - remove_count (event counts, not quantities).
      - name: friction_total
        description: Sum of the friction-family counts + OOS checks.
      - name: churn_signal
        description: >
          True when removes outnumbered adds for churn_consecutive_weeks
          observed weeks in a row (inactive weeks don't reset the streak).
          A UX follow-up flag, not a verdict.

  - name: mart_feature_pairing
    description: >
      Feature co-usage and trends, one row per feature pair x week. "Together"
      = same customer used both features the same day (no session id exists, so
      customer-day is the window; the pair RANKING is the signal). Pairs are
      emitted once (feature_a < feature_b); rows where feature_a = feature_b
      are the single-feature weekly trend. Actions only (feature_name);
      catalog sections are covered in mart_customer_weekly.
    columns:
      - name: week_start
        description: Monday of the ISO week.
        tests: [not_null]
      - name: feature_a
        description: First feature of the pair (alphabetical; = feature_b for trend rows).
        tests: [not_null]
      - name: feature_b
        description: Second feature of the pair.
        tests: [not_null]
      - name: co_occurrence_days
        description: Customer-days where both features were used.
      - name: customers_count
        description: Distinct customers behind the co-occurrences.
      - name: pct_of_a_days_with_b
        description: co_occurrence_days / days feature_a was used at all that week.
      - name: wow_change
        description: Week-over-week change in co_occurrence_days for the pair.

  - name: mart_item_demand_supply
    description: >
      App demand vs CABOT warehouse supply, one row per item x ISO week.
      Built for three questions: missed opportunities (interest while stock
      was dry), promote candidates (stock but no interest), restock risk
      (interest trending, inventory flat). Demand = interest at browse time
      (views + cart adds), NOT fulfilled sales — no order-level WMS link
      exists yet. Stock comparison is same-day: "when the customer looked,
      could CABOT have shipped it?". CAVEATS every consumer must know:
      supply covers warehouse CABOT ONLY (an item out of stock here may
      ship from an unmirrored site); demand history starts 2026-01-22;
      cart quantities come from ~89%-parseable payloads (losses visible in
      dq_unmatched_demand_skus). Signal thresholds are vars
      (demand_supply_* in dbt_project.yml).
    config:
      tags: ["demand", "wms"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [prtnum, week_start]
    columns:
      - name: prtnum
        description: WMS item number (= app sku).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_jdawms_items')
                field: prtnum
      - name: week_start
        description: Monday of the ISO week.
        tests: [not_null]
      - name: item_name
        description: US_ENGLISH item description.
      - name: item_family
        description: WMS product family.
      - name: abc_class
        description: ABC velocity class code.
      - name: abc_class_description
        description: Decoded ABC class.
      - name: velocity_zone
        description: WMS velocity zone.
      - name: item_views
        description: Item Detail opens + image enlarges that week.
      - name: cart_adds
        description: Cart add events that week.
      - name: cart_removes
        description: Cart remove events that week.
      - name: cart_add_qty
        description: Units added to cart (parseable payloads only).
      - name: peak_daily_customers
        description: Highest single-day distinct-customer count that week.
      - name: demand_active_days
        description: Days that week with any demand activity for the item.
      - name: demand_events
        description: item_views + cart_adds — the working demand measure.
      - name: views_prior_4wk_avg
        description: Average weekly item_views over the item's prior 4 observed weeks.
      - name: avg_shippable_qty
        description: Average daily shippable units at CABOT that week.
      - name: min_shippable_qty
        description: Lowest daily shippable units that week.
      - name: avg_on_hand_qty
        description: Average daily on-hand units that week.
      - name: shippable_eow
        description: Shippable units at the last snapshot of the week.
      - name: shippable_eow_prior_4wk_avg
        description: Average end-of-week shippable over the prior 4 observed weeks.
      - name: days_out_of_stock
        description: Snapshot days that week with zero shippable units.
      - name: snapshot_days
        description: Snapshot days observed that week (denominator for days_out_of_stock).
      - name: inbound_qty_peak
        description: Peak planned_qty + pnd_rcvqty that week (replenishment possibly in flight; semantics unconfirmed).
      - name: cart_adds_while_oos
        description: Cart adds landing on zero-shippable snapshot days — the core missed-opportunity count.
      - name: views_while_oos
        description: Item views landing on zero-shippable snapshot days.
      - name: is_trending_interest
        description: Views beat the prior-4-week average by demand_supply_trend_ratio (with a base floor).
      - name: signal
        description: >
          Weekly classification: missed_opportunity (demand hit a dry
          shelf), restock_risk (interest trending, stock not building),
          promote_candidate (stock but no interest), healthy. Thresholds
          from the demand_supply_* vars; precedence in that order. The mart
          is demand-driven: weeks before the event log went live are
          excluded entirely (supply-only history lives in
          int_jdawms_inventory_daily).
        tests:
          - accepted_values:
              arguments:
                values: [missed_opportunity, restock_risk, promote_candidate, healthy]
