version: 2

models:
  - name: mart_page_dwell
    description: >
      Customer app page analytics at page-name grain (one row per page).
      Sourced from stg_mysql__tracking_report_event. Search:* pages are
      normalised to "Search Results". is_category_page flags product category
      pages (e.g. Rice & Noodles, Beverages) vs nav/search pages.
    columns:
      - name: page_name
        description: Page name; Search:* variants collapsed to "Search Results".
        tests: [unique, not_null]
      - name: is_search_page
        description: True when the original page was a search-results page (Search:*).
      - name: is_category_page
        description: True for product category pages; false for nav and search pages.
      - name: visit_count
        description: Total page view events.
      - name: distinct_customers
        description: Unique customer_id values that visited this page.
      - name: total_dwell_seconds
        description: Sum of duration_seconds across all visits.
      - name: avg_dwell_seconds
        description: Average seconds per visit (rounded to 1 dp).

  - name: mart_customer_app_session
    description: >
      Customer app sessions at session grain (one row per tracking_report
      entity_id). Sourced from int_customer_sessions. Aggregates page views,
      dwell time, cart actions, search events, and SKU interactions per session.
    columns:
      - name: session_id
        description: Primary key — tracking_report entity_id.
        tests: [unique, not_null]
      - name: customer_id
        description: Customer identifier.
      - name: session_minutes
        description: Session duration in minutes (session_end - session_start).
      - name: page_views
        description: Non-null page events within the session.
      - name: distinct_pages
        description: Unique pages visited.
      - name: add_events
        description: Cart add actions (event_type contains 'add').
      - name: remove_events
        description: Cart remove or delete actions.
      - name: submit_events
        description: submit_quote_cart_page events — order placement attempts.
      - name: placed_order
        description: True if at least one submit_quote_cart_page event occurred.

  - name: mart_rep_customer_visits
    description: >
      Sales rep x customer grain (one row per rep-customer pair). Sourced from
      int_rep_activity_events, filtered to events where customer is populated
      and differs from username. Shows visit frequency, SKU coverage, and GPS
      availability per rep-customer relationship.
    columns:
      - name: username
        description: Sales rep login account.
        tests: [not_null]
      - name: customer
        description: Customer being visited.
        tests: [not_null]
      - name: visit_days
        description: Distinct calendar days the rep visited this customer.
      - name: relationship_days
        description: Days between first and last visit.
      - name: unique_skus_shown
        description: Distinct SKUs presented or ordered during visits.
      - name: has_gps
        description: True if any visit event had GPS coordinates.

  - name: mart_rep_daily_activity
    description: >
      Sales rep x day grain (one row per rep per calendar day). Sourced from
      int_rep_activity_events. Aggregates sessions, customer visits, SKU
      events, GPS pings, and device battery metrics per rep per day.
    columns:
      - name: username
        description: Sales rep login account.
        tests: [not_null]
      - name: activity_date
        description: Calendar date.
        tests: [not_null]
      - name: sessions
        description: Distinct session IDs active on this day.
      - name: total_events
        description: All activity events on this day.
      - name: customers_visited
        description: Distinct customers the rep interacted with (excludes self-reference).
      - name: unique_skus
        description: Distinct SKUs referenced in activity events.
      - name: gps_pings
        description: Events that had a non-null location.
      - name: active_minutes
        description: Minutes between first and last event of the day.
      - name: min_battery
        description: Lowest battery reading recorded (bigint percentage).
      - name: avg_battery
        description: Average battery level across events with a battery reading.

  - name: mart_order_journey
    description: >
      Page 1 order journey at order-cycle grain (one row per increment_id x
      customer). Exact lifecycle from fct_order_cycle: days_to_close +
      close_bucket (distribution), is_pending + days_pending + pending_priority
      (H/M/L), and behavior_segment (Decisive / Planner / Slow Sender from days
      in cycle). High-Editor segment and add-count weighting are deferred (need
      per-cycle edit counts); store-type cuts need NAV. Empty until the extract
      contains Group 04/09 events.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [increment_id, customer_key]
    columns:
      - name: increment_id
        description: Order increment id (PK with customer_key).
        tests: [not_null]
      - name: customer_key
        description: Unified customer key the cycle belongs to.
      - name: days_to_close
        description: Days from cycle open to submit; null if pending.
      - name: close_bucket
        description: Same day / 1-3 / 4-7 / 8-13 / 14+ days; null if pending.
      - name: is_pending
        description: True when the cycle opened but never submitted.
      - name: days_pending
        description: Days since the cycle opened, for pending cycles.
      - name: pending_priority
        description: H/M/L by days pending; null when submitted.
      - name: behavior_segment
        description: Decisive / Planner / Slow Sender from days in cycle; null if pending.

  - name: mart_discovery_navigation
    description: >
      Page 2 feature click->add funnel. Grain: feature (Recommend / Promo /
      New / Backorder). Per feature: icon clicks, page adds, customers who
      clicked vs added, and the behaviour-level click->add conversion. Resolves
      entirely from the event log — no order, NAV, or Address dependency.
      Companion mart_catalog_dwell covers the category dwell heatmap.
    columns:
      - name: feature
        description: Discovery feature — Recommend, Promo, New, or Backorder.
        tests: [not_null, unique]
      - name: click_events
        description: Total feature icon-click events (Group 18).
      - name: add_events
        description: Total adds from the feature's page (Group 10.5).
      - name: customers_clicked
        description: Distinct customers who clicked the feature icon.
      - name: customers_added
        description: Distinct customers who added from the feature page.
      - name: click_to_add_rate
        description: Of customers who clicked the feature icon, the share who also added from its page.

  - name: mart_catalog_dwell
    description: >
      Page 2 category dwell heatmap. Grain: category. Aggregates Catalog View
      analytics (19010000) per category — view events, distinct customers,
      pages viewed, and average / total time-on-page. Unknown category ids roll
      up to (unknown). CatalogFS / CatalogFC only.
    columns:
      - name: category_id
        description: Category id (PK), or (unknown) when unmapped.
        tests: [not_null, unique]
      - name: category_name
        description: Category name from seed_categories.
      - name: view_events
        description: Count of catalog-view events for the category.
      - name: avg_dwell_seconds
        description: Average time-on-page in seconds for the category.

  - name: mart_cart_behaviour
    description: >
      Page 3 cart behaviour at CUSTOMER grain (no order linkage available).
      Per customer: add / remove / qty-change event counts, distinct skus
      added, churn ratio (remove_events / add_events), and cart activity dates.
      Order-cycle framing (churn per cycle, same-day vs multi-day, conversion)
      is deferred until order events land — see DEFERRED-MODELS.md.
    columns:
      - name: customer_key
        description: Unified customer key (PK).
        tests: [not_null, unique]
      - name: actor_type
        description: sales or customer, from the source app.
      - name: add_events
        description: Count of add_item_* events (Group 10.5).
      - name: remove_events
        description: Count of remove_item_* events (Group 10.4).
      - name: qty_change_events
        description: Count of change_qty_item_* events (Group 10.15).
      - name: distinct_skus_added
        description: Distinct SKUs the customer added.
      - name: churn_ratio
        description: remove_events / add_events; null when no adds.
      - name: active_cart_days
        description: Distinct days with cart activity.
