version: 2

models:
  - name: fct_order_cycle
    description: >
      Published order-cycle fact — one row per increment_id x customer. Thin
      BI-facing view over int_order_cycle (open = Create Order, close = Group 04
      submit success). Consumed by mart_order_journey and BI drill-down. Empty
      until the event-log extract contains Group 04/09 events.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [increment_id, customer_key]
    columns:
      - name: increment_id
        description: Order increment id.
        tests: [not_null]
      - name: customer_key
        description: Unified customer key the cycle belongs to.
      - name: is_submitted
        description: True when the cycle has a successful submit.
      - name: days_to_close
        description: Days from open to submit; null if not submitted.
