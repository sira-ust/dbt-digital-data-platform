version: 2

models:
  - name: mart_event_record_errors
    description: >
      Row-level error/quarantine table — one row per (event record, rule
      violation), so a record breaking several rules appears once per rule.
      All rules are driven by the seed reference data: unknown_event_code
      (not in seed_event_codes), unknown_source_code (not in
      seed_app_sources), unexpected_payload / missing_payload (response
      presence contradicts the dictionary's payload_format),
      missing_event_time (device timestamp absent), unknown_category
      (Catalog View kv category id not in seed_categories).
      Rebuilt as a full table on every dbt build; rows clear automatically
      once the offending code/source/category is added to the seeds.
      No record is ever dropped from the main pipeline — this table is a
      side channel for review, not a filter.
    columns:
      - name: entity_id
        description: Source PK of the offending record (not unique here — one row per violation)
        tests:
          - not_null
      - name: error_type
        tests:
          - not_null
          - accepted_values:
              values:
                - unknown_event_code
                - unknown_source_code
                - unexpected_payload
                - missing_payload
                - missing_event_time
                - unknown_category
      - name: severity
        description: error = reference data mismatch; warn = doc-vs-reality drift
        tests:
          - accepted_values:
              values: [error, warn]
      - name: error_detail
        description: Human-readable explanation
      - name: response
        description: Raw payload of the offending record, for diagnosis

  - name: mart_error_summary
    description: >
      Triage rollup of mart_event_record_errors — one row per (error_type,
      description_code). Answers "how big is each problem, since when, on
      which apps" without scrolling the row-level table (at ~600k
      events/month the row-level table is not eyeball-able).
      Contains no detection logic of its own: mart_event_record_errors is
      the single source of truth for what counts as an error; this view is
      derived from it entirely.
      The API doc states the event table "will be further updated according
      to requirements", so unknown codes appearing here is expected schema
      drift. Triage: confirm with the API team; once the code/source/
      category is added to the official seed (re-run
      scripts/generate_event_glossary.py), its rows clear on the next build.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - error_type
            - severity
            - description_code
    columns:
      - name: error_type
        tests:
          - not_null
      - name: description_code
        description: The 8-digit code carried by the offending records
      - name: suspected_l1_category
        description: >
          L1 category name inferred from documented sibling codes sharing the
          same 2-digit L1 prefix; 'UNKNOWN L1 FAMILY' if no sibling exists.
      - name: violation_count
        description: Number of offending records for this (error_type, code)
      - name: first_seen_utc
        description: Earliest server-side created_at (UTC) among offenders
      - name: last_seen_utc
        description: Latest server-side created_at (UTC) among offenders
      - name: records_with_payload
        description: How many offending records carry a non-empty response
      - name: sample_response_min
        description: Sample payload (min) — aids reverse-engineering the format
      - name: sample_response_max
        description: Sample payload (max) — aids reverse-engineering the format
