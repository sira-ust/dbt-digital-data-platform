# Copy this file to profiles.yml in the repo root (git-ignored) and run with:
#   $env:DBT_PROFILES_DIR = "."          (PowerShell)
#   export DBT_PROFILES_DIR=.            (bash)
# or copy to ~/.dbt/profiles.yml.
#
# No credentials are needed for the DuckDB dev target — it reads local sample
# files from data/ (see data/README.md). The .duckdb database file it creates
# is git-ignored.

ust_digital_platform:
  target: dev
  outputs:
    # ── Local development: DuckDB over sample exports in data/ ──
    dev:
      type: duckdb
      path: dev.duckdb
      threads: 4

