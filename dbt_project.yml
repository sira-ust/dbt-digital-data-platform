name: ust_digital_platform

version: 1.0.0

config-version: 2



profile: ust_digital_platform



model-paths: ["models"]

analysis-paths: ["analyses"]

test-paths: ["tests"]

seed-paths: ["seeds"]

macro-paths: ["macros"]



clean-targets:

  - target

  - dbt_packages



# Layering:

#   staging/mysql/  view — source mapping (dedup, types, code split, UTC)

#   seeds/          reference data (event dictionary, apps, categories)

#   intermediate/       view — enrichment + per-family payload parsing

#   marts/core/facts/   fct_* event-grain facts for BI drill-down

#   marts/reporting/    mart_* aggregated scorecards

#   dq/                 audit tables + triage views

#   tests/              singular pipeline gate tests



models:

  ust_digital_platform:

    +persist_docs:

      relation: true

      columns: true



    staging:

      +materialized: view

      +schema: staging

      mysql:

        +tags: ["staging", "mysql"]



    intermediate:

      +materialized: view

      +schema: intermediate

      +tags: ["intermediate"]



    dq:

      +schema: dq

      +tags: ["dq"]

    marts:
      core:
        facts:
          +materialized: view
          +schema: facts
          +tags: ["facts"]
      reporting:
        +materialized: table
        +schema: reporting
        +tags: ["reporting"]

seeds:

  ust_digital_platform:

    +schema: seeds

    seed_event_codes:

      +column_types:

        description_code: string

        has_geo: boolean

        is_system_event: boolean

    seed_app_sources:

      +column_types:

        source_code: string

    seed_categories:

      +column_types:

        category_id: string



tests:

  +store_failures: true

  +schema: test_failures

