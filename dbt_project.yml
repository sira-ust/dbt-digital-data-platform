name: ust_digital_platform

version: 1.0.0

config-version: 2



profile: ust_digital_platform



model-paths: ["models"]

analysis-paths: ["analyses"]

test-paths: ["tests"]

seed-paths: ["seeds"]

macro-paths: ["macros"]



clean-targets:

  - target

  - dbt_packages

vars:
  # Order-cycle heuristic — decided 2026-07-08, holds until the app team stamps
  # increment_id onto cart events (then cycles switch to exact order grouping).
  cycle_gap_minutes: 60       # gap that ends an activity burst
  cycle_abandon_days: 7       # open cycle with no activity this long = abandoned
  churn_consecutive_weeks: 3  # removes > adds this many weeks running = churn signal



# Layering:

#   staging/mysql/   view — 1:1 with MySQL tables (ust_website schema); local dev reads
#                    JSON via external_location; remove external_location when MySQL
#                    connection is available and add credentials to profiles.yml

#   seeds/           reference data (event dictionary, apps, categories)

#   intermediate/    view — enrichment + per-family payload parsing

#   marts/core/facts/   fct_* event-grain facts for BI drill-down

#   marts/reporting/    mart_* aggregated scorecards

#   dq/              audit tables + triage views

#   tests/           singular pipeline gate tests



models:

  ust_digital_platform:

    +persist_docs:

      relation: true

      columns: true



    staging:
      +materialized: view
      +schema: ust_staging
      mysql:
        # Blanket policy: staging is always a view. MySQL staging does only
        # cast/trim + a single row_number() dedupe over small website data —
        # recompute cost is near-zero even at fan-out 2, so no table needed.
        +materialized: view
        +tags: ["staging", "mysql"]
      jdawms:
        # Runs on both targets: databricks reads the real jdawmsrep replica;
        # duckdb reads mock parquet (data/mock/jdawmsrep/, generated by
        # scripts/generate_jdawms_mock.py — run it once before dbt build).
        +materialized: view
        +tags: ["staging", "jdawms", "wms"]



    intermediate:
      # Blanket policy: the intermediate layer is where the expensive, reused
      # work lives (payload parsing, timezone conversion, joins, complex dedupe),
      # and marts reuse it — so materialize as tables (compute once, read many).
      +materialized: table
      +schema: ust_intermediate
      +tags: ["intermediate"]



    marts:
      # Consumption layer. Event-grain facts and keyed/dated marts are
      # incremental (process new rows only, merge on the grain key). Lifetime
      # aggregates with no partition key stay full-refresh tables (set per-model).
      core:
        facts:
          +materialized: table
          +schema: ust_facts
          +tags: ["facts"]
      reporting:
        +materialized: table
        +schema: ust_reporting
        +tags: ["reporting"]

    dq:
      +materialized: view
      +schema: ust_dq
      +tags: ["dq"]

seeds:

  ust_digital_platform:

    +schema: ust_seeds

    seed_event_codes:

      +column_types:

        description_code: string

        has_geo: boolean

        is_system_event: boolean

    seed_app_sources:

      +column_types:

        source_code: string

    seed_categories:

      +column_types:

        category_id: string

    # All code columns below are strings on purpose: staging models cast the
    # raw codes to string, and Databricks won't implicit-cast joins the way
    # DuckDB does.
    seed_category_name_aliases:
      +column_types:
        category_id: string

    seed_app_category_codes:
      +column_types:
        app_category_code: string
        app_id: string
        ust_category_id: string

    # Disabled: these decode the LEGACY two-tier tracking/activity streams,
    # whose staging/int/mart models were removed 2026-07-08 (superseded by the
    # system_event_log spine). CSVs stay as the dev team's verbatim reference;
    # re-enable if the legacy streams ever need decoding again.
    seed_tracking_event_types:
      +enabled: false
      +column_types:
        event_type_code: string

    seed_tracking_methods:
      +enabled: false
      +column_types:
        method_code: string

    seed_tracking_sources:
      +enabled: false

    seed_tracking_icons:
      +enabled: false

    seed_activity_types:
      +enabled: false
      +column_types:
        activity_type_code: string

    seed_activity_methods:
      +enabled: false
      +column_types:
        method_code: string

    # Disabled: not referenced via ref() anywhere — the jdawms glossary/mock
    # scripts read these CSVs directly from seeds/, not from a database table.
    # Re-enable once a model actually needs to join against them (e.g. when
    # jdawms coded-value seeds land and something decodes comtyp in SQL).
    seed_jdawms_data_dictionary:
      +enabled: false

    seed_jdawms_comtyp:
      +enabled: false

tests:

  +store_failures: true

  +schema: test_failures

