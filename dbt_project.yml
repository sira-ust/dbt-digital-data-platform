name: ust_digital_platform

version: 1.0.0

config-version: 2



profile: ust_digital_platform



model-paths: ["models"]

analysis-paths: ["analyses"]

test-paths: ["tests"]

seed-paths: ["seeds"]

macro-paths: ["macros"]



clean-targets:

  - target

  - dbt_packages



# Layering:

#   staging/mysql/   view — 1:1 with MySQL tables (ust_website schema); local dev reads
#                    JSON via external_location; remove external_location when MySQL
#                    connection is available and add credentials to profiles.yml

#   seeds/           reference data (event dictionary, apps, categories)

#   intermediate/    view — enrichment + per-family payload parsing

#   marts/core/facts/   fct_* event-grain facts for BI drill-down

#   marts/reporting/    mart_* aggregated scorecards

#   dq/              audit tables + triage views

#   tests/           singular pipeline gate tests



models:

  ust_digital_platform:

    +persist_docs:

      relation: true

      columns: true



    staging:
      +materialized: view
      +schema: staging
      mysql:
        +materialized: table        
        +tags: ["staging", "mysql"]



    intermediate:

      +materialized: view

      +schema: ust_intermediate

      +tags: ["intermediate"]



    marts:
      core:
        facts:
          +materialized: view
          +schema: ust_facts
          +tags: ["facts"]
      reporting:
        +materialized: table
        +schema: ust_reporting
        +tags: ["reporting"]

seeds:

  ust_digital_platform:

    +schema: ust_seeds

    seed_event_codes:

      +column_types:

        description_code: string

        has_geo: boolean

        is_system_event: boolean

    seed_app_sources:

      +column_types:

        source_code: string

    seed_categories:

      +column_types:

        category_id: string

tests:

  +store_failures: true

  +schema: test_failures

